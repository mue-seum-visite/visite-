<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Paulus Étape 2 - Rue des Gravelles 1920</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        .btn-retour {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 10px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 12px;
            border: 1px solid white;
            font-family: sans-serif;
        }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden; background-color: black;">
    
    <a href="index.html?map=true" class="btn-retour">← RETOUR CARTE</a>

    <div id="instruction" style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; color: white; background: rgba(0,0,0,0.8); padding: 15px 30px; font-family: sans-serif; border-radius: 50px; text-align: center; width: 70%; border: 2px solid white; cursor: pointer;">
      <strong>RÉVÉLER LES GRAVELLES 1920</strong>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
      <a-entity camera></a-entity>
    </a-scene>

    <video id="vid-etape2" 
           src="gravelles1920.mp4" 
           loop="true" 
           muted="true" 
           playsinline 
           webkit-playsinline 
           crossorigin="anonymous"
           style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; opacity: 0; z-index: 5; pointer-events: none; transition: opacity 2s ease-in;">
    </video>

    <script>
      const v2 = document.querySelector('#vid-etape2');
      const inst2 = document.getElementById('instruction');

      // Déclenchement au clic
      document.body.addEventListener('click', function () {
        v2.play().catch(e => console.log("Erreur lecture:", e));
        v2.style.opacity = '0.65'; 
        inst2.style.opacity = '0';
        setTimeout(() => { inst2.style.display = 'none'; }, 2000);
      });
    </script>
  </body>
</html>
