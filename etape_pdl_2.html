<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Pont-de-Loup - Étape 2 : L'Empereur</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <link rel="stylesheet" href="style2.css">
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        .btn-retour {
            position: fixed; top: 25px; left: 20px; z-index: 9999;
            background: rgba(0, 0, 0, 0.6); color: white; padding: 12px 18px;
            border-radius: 10px; text-decoration: none; font-size: 14px;
            font-weight: bold; border: 1px solid #8cb6d1; backdrop-filter: blur(4px);
        }
        #subtitles-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; background: rgba(0, 0, 0, 0.8); border-radius: 15px;
            padding: 15px; z-index: 100; border: 1px solid #8cb6d1; text-align: center;
        }
        #text-display { color: white; font-family: 'Georgia', serif; font-size: 1em; font-style: italic; line-height: 1.4; }
        #vid-empereur { display: none; }
    </style>
</head>

<body>
    <a href="index2.html?map=true" class="btn-retour">← RETOUR CARTE</a>

    <div id="subtitles-container">
        <div id="text-display">Initialisation...</div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-assets>
            <video id="vid-empereur" src="louis.mp4" autoplay loop="true" muted playsinline crossorigin="anonymous"></video>
        </a-assets>

        <a-video 
            src="#vid-empereur" 
            position="0 0.8 -4" 
            width="1.8" 
            height="2.8"
            material="shader: flat; transparent: true; blending: multiply;"
            class="video-ar-element">
        </a-video>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const textDisplay = document.getElementById('text-display');
        const phrases = [
            "Le village de Pont-de-Loup est riche d’un passé prestigieux, autrefois domaine de Louis le Pieux, fils de Charlemagne.",
            "De cette époque subsiste la tour classée de l’ancienne église Saint-Anaclet.",
            "L'église se dressait au milieu du cimetière d’honneur.",
            "Ce site abrite aussi une source miraculeuse réputée pour guérir la surdité."
        ];

        let index = 0;
        function showNext() {
            if (index < phrases.length) {
                textDisplay.style.opacity = 0;
                setTimeout(() => {
                    textDisplay.innerHTML = phrases[index];
                    textDisplay.style.opacity = 1;
                    index++;
                }, 500);
            } else {
                index = 0; // Recommencer les phrases en boucle
            }
        }
        setInterval(showNext, 6000);
        showNext();

        document.body.addEventListener('click', function() {
            document.getElementById('vid-empereur').play();
        }, {once: true});
    </script>
</body>
</html>
