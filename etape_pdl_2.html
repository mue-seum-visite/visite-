<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Pont-de-Loup - Étape 2 : L'Empereur</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        
        /* Bouton Retour corrigé pour index2.html */
        .btn-retour {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid #8cb6d1;
        }

        #subtitles-container {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 85%; background: rgba(0, 0, 0, 0.8); border-radius: 12px;
            padding: 15px; z-index: 100; border: 1px solid #8cb6d1; text-align: center;
        }

        #text-display { 
            color: white; 
            font-family: 'Georgia', serif; 
            font-size: 1em; 
            font-style: italic; 
            line-height: 1.4;
            transition: opacity 0.5s;
        }
    </style>
</head>

<body>

    <a href="index2.html?map=true" class="btn-retour">← RETOUR CARTE</a>

    <div id="subtitles-container">
        <div id="text-display">Initialisation de la rencontre...</div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        
        <a-assets>
            <img id="perso" src="louis.png">
        </a-assets>

        <a-image 
            src="#perso" 
            position="0 0.4 -4" 
            width="1.1" 
            height="1.7"
            look-at="[camera]">
        </a-image>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const textDisplay = document.getElementById('text-display');
        const phrases = [
            "Le village de Pont-de-Loup est riche d’un passé prestigieux, autrefois domaine de Louis le Pieux, fils de Charlemagne.",
            "De cette époque subsiste la tour classée de l’ancienne église Saint-Anaclet.",
            "Élu troisième pape de la Chrétienté après saint Pierre, il mourut en martyr.",
            "Les vestiges de l'église se dressent au milieu du cimetière d’honneur.",
            "Le site conserve les tombes des héros des deux guerres et de 1830.",
            "Un vaisseau gothique remplaça la nef romane avant d'être finalement démoli en 1861.",
            "Ce site abrite aussi une source miraculeuse réputée pour guérir la surdité."
        ];

        let index = 0;
        function showNext() {
            if (index < phrases.length) {
                // Petit effet de fondu pour le changement de texte
                textDisplay.style.opacity = 0;
                setTimeout(() => {
                    textDisplay.innerHTML = phrases[index];
                    textDisplay.style.opacity = 1;
                    index++;
                }, 500);
            }
        }
        
        // VITESSE CORRIGÉE : Changement toutes les 5 secondes (5000ms)
        setInterval(showNext, 5000);
        showNext();
    </script>
</body>
</html>
