<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Test AR Simple</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f0f0; }
        model-viewer { width: 100vw; height: 100vh; }
        
        #ar-button {
            background-color: #007bff;
            color: white;
            border-radius: 8px;
            border: none;
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 25px;
            font-size: 16px;
            font-weight: bold;
            z-index: 100;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Astronaut/glTF-Binary/Astronaut.glb" 
        ar 
        ar-modes="scene-viewer webxr quick-look" 
        ar-placement="floor"
        camera-controls 
        auto-rotate 
        shadow-intensity="1">
        
        <button slot="ar-button" id="ar-button">
            ACTIVER LA RÉALITÉ AUGMENTÉE
        </button>

    </model-viewer>

</body>
</html>
