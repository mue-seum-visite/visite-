<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Pont-de-Loup - Étape 2</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    
    <style>
        body { margin: 0; font-family: sans-serif; background: #000; }
        model-viewer {
            width: 100vw; height: 100vh; background-color: #222;
        }
        #subtitles-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; background: rgba(0, 0, 0, 0.8); border-radius: 15px;
            padding: 20px; z-index: 20; border: 1px solid #8cb6d1; text-align: center;
        }
        #text-display { color: white; font-style: italic; transition: opacity 0.5s; }
        .btn-retour {
            position: fixed; top: 20px; left: 20px; z-index: 100;
            background: rgba(0,0,0,0.5); color: white; padding: 10px;
            border-radius: 10px; text-decoration: none; font-size: 12px;
        }
    </style>
</head>
<body>

    <a href="index.html?map=true" class="btn-retour">← RETOUR CARTE</a>

    <model-viewer 
        src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Astronaut/glTF-Binary/Astronaut.glb" 
        ar ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        auto-rotate 
        shadow-intensity="1">
        
        <button slot="ar-button" style="background-color: white; border-radius: 4px; border: none; position: absolute; top: 20px; right: 20px; padding: 10px;">
            👋 ACTIVER LA RÉALITÉ AUGMENTÉE
        </button>

        <div id="subtitles-container">
            <div id="text-display">Chargement de l'histoire...</div>
        </div>
    </model-viewer>

    <script>
        const textDisplay = document.getElementById('text-display');
        const message = [
            "Le village de Pont-de-Loup est riche d’un passé prestigieux, autrefois domaine de Louis le Pieux, fils de Charlemagne.",
            "De cette époque subsiste la tour classée de l’ancienne église Saint-Anaclet.",
            "Élu troisième pape de la Chrétienté après saint Pierre, il mourut en martyr.",
            "Les vestiges de l'église se dressent au milieu du cimetière d’honneur.",
            "Le site conserve les tombes des héros des deux guerres et de 1830.",
            "Un vaisseau gothique remplaça la nef romane avant d'être démoli en 1861.",
            "Ce site abrite aussi une source miraculeuse réputée pour guérir la surdité."
        ];

        let lineIndex = 0;
        function showNextLine() {
            if (lineIndex < message.length) {
                textDisplay.style.opacity = 0;
                setTimeout(() => {
                    textDisplay.innerHTML = message[lineIndex];
                    textDisplay.style.opacity = 1;
                    lineIndex++;
                }, 500);
            }
        }
        setInterval(showNextLine, 8000);
        showNextLine();
    </script>
</body>
</html>
