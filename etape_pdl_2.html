<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Test AR Pont-de-Loup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        /* On enlève le fond noir pour être sûr de voir la caméra */
        body { margin: 0; background-color: transparent; }
        model-viewer { width: 100vw; height: 90vh; }
    </style>
</head>
<body>

    <model-viewer 
        src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Astronaut/glTF-Binary/Astronaut.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1">
        
        <button slot="ar-button" style="background: #8cb6d1; color: white; border: none; padding: 15px; border-radius: 10px; position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 100;">
            ACTIVER LA CAMÉRA (AR)
        </button>
    </model-viewer>

    <div style="padding: 20px; text-align: center; color: white; background: rgba(0,0,0,0.8);">
        Si l'écran est noir, vérifiez que vous avez autorisé la caméra dans les réglages de votre navigateur.
    </div>

</body>
</html>
