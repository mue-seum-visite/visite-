<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Pont-de-Loup - Étape 2 : L'Empereur</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-chromakey-material/dist/aframe-chromakey-material.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        .btn-retour {
            position: fixed; top: 25px; left: 20px; z-index: 9999;
            background: rgba(0, 0, 0, 0.6); color: white; padding: 12px 18px;
            border-radius: 10px; text-decoration: none; font-size: 14px;
            font-weight: bold; border: 1px solid #8cb6d1;
        }
        #subtitles-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; background: rgba(0, 0, 0, 0.8); border-radius: 15px;
            padding: 15px; z-index: 100; border: 1px solid #8cb6d1; text-align: center;
        }
        #text-display { color: white; font-family: 'Georgia', serif; font-size: 1em; font-style: italic; transition: opacity 0.5s; }
    </style>
</head>

<body>
    <a href="index2.html?map=true" class="btn-retour">← RETOUR CARTE</a>

    <div id="subtitles-container">
        <div id="text-display">Touchez l'écran pour faire apparaître l'Empereur...</div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-assets>
            <video id="vid-empereur" src="louis.mp4" loop="true" muted playsinline crossorigin="anonymous"></video>
        </a-assets>

        <a-entity id="louis-entity"
            geometry="primitive: plane; width: 2.2; height: 2.2"
            position="0 0 -5"
            material="shader: chromakey; src: #vid-empereur; color: 1 1 1; distance: 0.12; repeat: 0.96 0.96; offset: 0.02 0.02"
            class="video-ar-element">
        </a-entity>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const video = document.getElementById('vid-empereur');
        const textDisplay = document.getElementById('text-display');
        
        const phrases = [
            "Louis le Pieux, fils de Charlemagne, veille sur Pont-de-Loup.",
            "De cette époque subsiste la tour classée de l’ancienne église.",
            "L'église se dressait au milieu du cimetière d’honneur.",
            "Ce site abrite aussi une source miraculeuse réputée."
        ];

        let index = 0;
        function showNext() {
            textDisplay.style.opacity = 0;
            setTimeout(() => {
                textDisplay.innerHTML = phrases[index];
                textDisplay.style.opacity = 1;
                index = (index + 1) % phrases.length;
            }, 500);
        }

        document.body.addEventListener('click', function() {
            video.play();
            setInterval(showNext, 6000);
            showNext();
        }, {once: true});
    </script>
</body>
</html>
