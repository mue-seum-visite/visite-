<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Scan AR - Pont-de-Loup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; }
        model-viewer { width: 100vw; height: 100vh; display: none; } /* On cache l'aperçu */
    </style>
</head>
<body>

    <model-viewer id="viewer"
        src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Astronaut/glTF-Binary/Astronaut.glb" 
        ar 
        ar-modes="scene-viewer quick-look" 
        ar-placement="floor"
        camera-controls>
        
        <button slot="ar-button" id="ar-button" style="display:none;"></button>
    </model-viewer>

    <script>
        // Dès que le modèle est chargé, on force l'activation de la RA
        const viewer = document.querySelector("#viewer");
        const arButton = document.querySelector("#ar-button");

        viewer.addEventListener('load', () => {
            // On attend une demi-seconde et on lance le mode scan du sol
            setTimeout(() => {
                arButton.click();
            }, 500);
        });
    </script>
</body>
</html>
