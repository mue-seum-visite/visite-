<!DOCTYPE html>
<html lang="fr">
<head>
    <title>MUE.SÉUM - Châtelet</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; font-family: sans-serif; background: #000; color: white; }
        #map { height: 100vh; width: 100vw; display: none; }
        .explorer-container { padding: 30px 20px; text-align: center; }
        .card { background: #1c1c1e; border-radius: 20px; overflow: hidden; border: 1px solid #333; margin-top: 20px; }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .btn-start { background: #97f097; color: #000; padding: 15px 30px; border-radius: 30px; font-weight: bold; border: none; margin: 20px 0; cursor: pointer; }
    </style>
</head>
<body>

<div id="catalog" class="explorer-container">
    <h1 style="color:#97f097">MUE.SÉUM</h1>
    <div class="card">
        <img src="IMG_4536.jpg"> 
        <div style="padding:15px">
            <h2>Circuit Pierre Paulus</h2>
            <button class="btn-start" onclick="showMap()">DÉMARRER LE PARCOURS</button>
        </div>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map;
    function showMap() {
        document.getElementById('catalog').style.display = 'none';
        document.getElementById('map').style.display = 'block';
        
        // Centre de la carte
        map = L.map('map').setView([50.4035, 4.5275], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // --- TRACÉ GPS PUR (EXTRAIT DE UMAP) ---
        // Le 1er et le 10ème point sont identiques pour boucler le circuit
        var circuitGps = [
            [50.40224, 4.52684], 
            [50.40328, 4.52674], 
            [50.40421, 4.52654], 
            [50.40465, 4.52932], 
            [50.40488, 4.53066], 
            [50.40432, 4.53118], 
            [50.40324, 4.53183], 
            [50.40165, 4.53022], 
            [50.40098, 4.52805], 
            [50.40224, 4.52684]  
        ];

        // Dessin de la ligne bleue (Le tracé de rando)
        L.polyline(circuitGps, {
            color: '#3498db', 
            weight: 6, 
            opacity: 0.9,
            lineJoin: 'round'
        }).addTo(map);

        // --- LES 5 POINTS DE VUE (MARQUEURS) ---
        var pointsEtapes = [
            [50.40224, 4.52684],
            [50.40421, 4.52654],
            [50.40488, 4.53066],
            [50.40324, 4.53183],
            [50.40098, 4.52805]
        ];

        pointsEtapes.forEach((pos, i) => {
            L.circleMarker(pos, {
                radius: 10, 
                color: '#97f097', 
                fillColor: '#97f097', 
                fillOpacity: 1
            }).addTo(map).bindPopup("<b>Étape " + (i+1) + "</b><br><button onclick='openRA()'>VOIR L'ŒUVRE</button>");
        });

        // --- GÉOLOCALISATION GPS ---
        map.locate({setView: false, watch: true});
        map.on('locationfound', function(e) {
            L.circleMarker(e.latlng, {
                radius: 7, 
                color: '#fff', 
                fillColor: '#3498db', 
                fillOpacity: 1
            }).addTo(map);
        });
    }

    function openRA() {
        alert("Lancement de la Réalité Augmentée...");
        // Ici on ajoutera ton lien vers la caméra RA plus tard
    }
</script>
</body>
</html>
