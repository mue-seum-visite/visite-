<!DOCTYPE html>
<html lang="fr">
<head>
    <title>MUE.SÉUM - Circuit Officiel</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; background: #000; color: white; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; display: none; }
        .explorer-container { padding: 30px; text-align: center; }
        .btn-start { background: #97f097; color: #000; padding: 15px 30px; border-radius: 30px; font-weight: bold; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div id="catalog" class="explorer-container">
    <h1 style="color:#97f097">MUE.SÉUM</h1>
    <p>Données GPS extraites avec succès.</p>
    <button class="btn-start" onclick="showMap()">LANCER LE CIRCUIT</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map;
    function showMap() {
        document.getElementById('catalog').style.display = 'none';
        document.getElementById('map').style.display = 'block';
        
        // On centre sur tes coordonnées
        map = L.map('map').setView([50.406, 4.523], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // --- TES COORDONNÉES GPS EXTRAITES ET CORRIGÉES ---
        var circuitOfficiel = [
            [50.4044627, 4.5230877], // Hôtel de Ville
            [50.4046263, 4.5221912], // Rue de la Montagne
            [50.4069696, 4.5217572], // Rue des Gravelles
            [50.4082915, 4.5205504], // Allée de la Sambre
            [50.408729, 4.523975],   // Point de passage Pont
            [50.4067226, 4.5250463], // Rue Paulus
            [50.4044627, 4.5230877]  // Retour Départ (Boucle)
        ];

        // Tracé de la ligne bleue
        L.polyline(circuitOfficiel, {color: '#3498db', weight: 5, opacity: 0.8}).addTo(map);

        // Ajout des points d'intérêt
        circuitOfficiel.forEach((pos, i) => {
            if(i < circuitOfficiel.length - 1) { // Ne pas doubler le marqueur sur le point de retour
                L.circleMarker(pos, {radius: 8, color: '#97f097', fillColor: '#97f097', fillOpacity: 1})
                .addTo(map)
                .bindPopup("Étape " + (i+1));
            }
        });

        // Géolocalisation réelle
        map.locate({setView: false, watch: true});
        map.on('locationfound', function(e) {
            L.circleMarker(e.latlng, {radius: 6, color: '#fff', fillColor: '#3498db', fillOpacity: 1}).addTo(map);
        });
    }
</script>
</body>
</html>
