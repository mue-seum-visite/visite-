<!DOCTYPE html>
<html lang="fr">
<head>
    <title>MUE.SÉUM - Châtelet</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin:0; padding:0; background: #000; color: white; font-family: -apple-system, sans-serif; min-height: 100vh; overflow-x: hidden; }
        #ui-explorer { padding-bottom: 60px; transition: opacity 0.8s ease; }
        
        header { background: #000; padding: 40px 20px 10px; text-align: center; }
        header h1 { font-size: 32px; letter-spacing: 5px; font-weight: 900; margin: 0; text-transform: uppercase; color: #fff; }
        .subtitle { font-size: 14px; color: #97f097; margin-top: 10px; font-style: italic; letter-spacing: 1px; }

        .rando-card { background: #1c1c1e; border-radius: 28px; overflow: hidden; margin: 20px; border: 1px solid #333; }
        .brand-image { width: 100%; height: 200px; background: url('share-card.jpg') center center / cover no-repeat; border-bottom: 2px solid #333; }
        .old-map-preview { width: 90%; height: 160px; margin: 15px auto; border-radius: 15px; background: url('carte-ancienne-chatelet.jpg') center center / cover no-repeat; border: 1px solid #444; }
        
        .rando-info { padding: 25px; text-align: center; }
        .rando-title { font-size: 1.5em; font-weight: 300; margin-bottom: 10px; color: #fff; line-height: 1.3; }
        .rando-highlight { color: #97f097; font-weight: 800; text-transform: uppercase; display: block; }
        
        .btn-demarrer { width: 100%; background: #97f097; color: #000; padding: 22px; border-radius: 20px; font-weight: 900; border: none; cursor: pointer; text-transform: uppercase; font-size: 1.1em; margin-bottom: 15px; }
        .btn-google { width: 100%; background: transparent; color: #97f097; padding: 15px; border-radius: 20px; border: 1px solid #97f097; font-weight: bold; cursor: pointer; }

        #transition-voyage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 4000; display: none; background: #000; }
        #vortex-map { position: absolute; width: 100%; height: 100%; background: url('carte-ancienne-chatelet.jpg') center center / cover no-repeat; opacity: 0; }

        /* LA CARTE EST MAINTENANT CLAIRE POUR LA LISIBILITÉ */
        #map { height: 100vh; width: 100vw; display: none; background: #fff; position: fixed; top: 0; left: 0; }
        #btn-quitter-carte { position: fixed; top: 25px; right: 20px; z-index: 5000; background: rgba(255,255,255,0.9); color: #000; border: 2px solid #000; padding: 12px 20px; border-radius: 50px; font-weight: bold; display: none; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .label-etape { background: #000; border: 2px solid #97f097; border-radius: 50%; color: #97f097; font-weight: bold; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .btn-action { background: #000; color: #97f097; border: 1px solid #97f097; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="ui-explorer">
        <header>
            <h1>MUE.SÉUM</h1>
            <div class="subtitle">"Le Portail du Temps : L'Art s'éveille"</div>
        </header>
        <div class="rando-card">
            <div class="brand-image"></div>
            <div class="old-map-preview"></div>
            <div class="rando-info">
                <p class="rando-title">L'horizon de fer & <span class="rando-highlight">L'âme de Paulus</span></p>
                <button class="btn-demarrer" onclick="lancerVoyage()">Ouvrir la porte du temps</button>
                <button class="btn-google" onclick="allerAuDepart()">Rejoindre le Maître</button>
            </div>
        </div>
    </div>

    <div id="transition-voyage"><div id="vortex-map"></div></div>
    <button id="btn-quitter-carte" onclick="location.reload()">✕ QUITTER</button>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map;
        const latDep = 50.4044627; const lngDep = 4.5230877;

        function allerAuDepart() {
            window.open(`https://www.google.com/maps/dir/?api=1&destination=${latDep},${lngDep}`, '_blank');
        }

        function lancerVoyage() {
            const trans = document.getElementById('transition-voyage');
            const vortex = document.getElementById('vortex-map');
            const explorer = document.getElementById('ui-explorer');
            trans.style.display = 'block';
            explorer.style.opacity = '0';
            setTimeout(() => {
                vortex.style.opacity = '1';
                vortex.style.transition = "transform 3s ease-in, opacity 1s";
                vortex.style.transform = "scale(3)";
                setTimeout(() => {
                    document.getElementById('map').style.display = 'block';
                    document.getElementById('btn-quitter-carte').style.display = 'block';
                    initMap();
                    trans.style.display = 'none';
                }, 2800);
            }, 100);
        }

        function initMap() {
            if (map) return;
            // CARTE NORMALE (Rues claires, noms bien visibles)
            map = L.map('map', { zoomControl: false }).setView([50.407, 4.522], 16);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            // TRACÉ BLEU (Plus épais pour être bien vu sur carte claire)
            var trace = [[50.404741, 4.523157], [50.405149, 4.524318], [50.406281, 4.526237], [50.406527, 4.525638], [50.40675, 4.524963], [50.407117, 4.523852], [50.40651, 4.523013], [50.406253, 4.522654], [50.406561, 4.522122], [50.406818, 4.521565], [50.408204, 4.523373], [50.408706, 4.522609], [50.408878, 4.521914], [50.40911, 4.521411], [50.409005, 4.520713], [50.408489, 4.520219], [50.407981, 4.519698], [50.407497, 4.518906], [50.407638, 4.518756], [50.406828, 4.519497], [50.406623, 4.519893], [50.406276, 4.52026], [50.405674, 4.521287], [50.405391, 4.52133], [50.404547, 4.521566], [50.404603, 4.522819], [50.404492, 4.523032]];
            L.polyline(trace, {color: '#007AFF', weight: 6, opacity: 0.8}).addTo(map);

            var pts = [
                { latlng: [50.4044627, 4.5230877], t: "I. L'Éveil du Coq", file: "coq-ar.html" },
                { latlng: [50.4067226, 4.5250463], t: "II. Berceau de Lumière", file: "maison-ar.html" },
                { latlng: [50.4069696, 4.5217572], t: "III. Murmures d'Ouvriers", file: "etape2.html" },
                { latlng: [50.4082915, 4.5205504], t: "IV. Le Miroir de Sambre", file: "sambre-ar.html" },
                { latlng: [50.4046263, 4.5221912], t: "V. Le Souffle du Fer", file: "etape4.html" }
            ];

            pts.forEach((pt, i) => {
                let m = L.circleMarker(pt.latlng, {radius: 12, color: '#000', fillColor: '#97f097', fillOpacity: 1}).addTo(map);
                m.bindPopup(`<div style="color:black; text-align:center; font-family:sans-serif;"><b>${pt.t}</b><br><button class="btn-action" onclick="window.location.href='${pt.file}'">DÉCOUVRIR L'ART</button></div>`);
                L.marker(pt.latlng, { icon: L.divIcon({ className: 'label-etape', html: (i+1), iconSize: [24, 24], iconAnchor: [12, 12] }) }).addTo(map);
            });

            // GPS UTILISATEUR
            map.locate({setView: false, watch: true});
            map.on('locationfound', e => {
                if(!window.userMarker) {
                    window.userMarker = L.circleMarker(e.latlng, {radius: 9, color: '#fff', weight: 3, fillColor: '#007AFF', fillOpacity: 1}).addTo(map);
                } else {
                    window.userMarker.setLatLng(e.latlng);
                }
            });
        }
    </script>
</body>
</html>
