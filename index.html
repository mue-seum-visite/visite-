<!DOCTYPE html>
<html lang="fr">
<head>
    <title>MUE.SÉUM - Châtelet</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; background: #111; color: white; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; display: none; }
        .explorer-container { padding: 40px 20px; text-align: center; }
        .btn-start { background: #97f097; color: #000; padding: 18px 35px; border-radius: 40px; font-weight: bold; border: none; font-size: 1.1em; cursor: pointer; box-shadow: 0 4px 15px rgba(151, 240, 151, 0.3); }
        .card { background: #1c1c1e; border-radius: 20px; padding: 20px; border: 1px solid #333; margin-top: 20px; }
    </style>
</head>
<body>

<div id="catalog" class="explorer-container">
    <h1 style="color:#97f097; letter-spacing: 2px;">MUE.SÉUM</h1>
    <div class="card">
        <p>Circuit Pierre Paulus</p>
        <button class="btn-start" onclick="showMap()">DÉMARRER LA RANDO</button>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map;
    function showMap() {
        document.getElementById('catalog').style.display = 'none';
        document.getElementById('map').style.display = 'block';
        
        map = L.map('map').setView([50.406, 4.523], 16);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // --- LE TRACÉ "ANTI-PLONGEON" (Suit les rues réelles) ---
        var cheminRando = [
            [50.40446, 4.52308], // Départ Hôtel de Ville
            [50.40462, 4.52219], // Rue de la Montagne
            [50.40550, 4.52200], // Montée vers Gravelles
            [50.40696, 4.52175], // Rue des Gravelles
            [50.40800, 4.52130], // Virage vers Sambre
            [50.40829, 4.52055], // Allée de la Sambre
            [50.40850, 4.52150], // Suivi du Quai
            [50.40872, 4.52397], // ENTRÉE PASSERELLE (Côté Nord)
            [50.40810, 4.52440], // SORTIE PASSERELLE (Côté Sud)
            [50.40672, 4.52504], // Rue Paulus
            [50.40550, 4.52450], // Retour vers centre
            [50.40446, 4.52308]  // Boucle Bouclée !
        ];

        // Dessin du tracé bleu (épais pour bien voir sur mobile)
        L.polyline(cheminRando, {
            color: '#3498db', 
            weight: 7, 
            opacity: 0.8,
            lineJoin: 'round'
        }).addTo(map);

        // --- LES ÉTAPES (TES POINTS GPX) ---
        var etapes = [
            {pos: [50.40446, 4.52308], n: "Hôtel de Ville"},
            {pos: [50.40696, 4.52175], n: "Rue des Gravelles"},
            {pos: [50.40829, 4.52055], n: "Allée de la Sambre"},
            {pos: [50.40672, 4.52504], n: "Rue Paulus"},
            {pos: [50.40872, 4.52397], n: "Passerelle"}
        ];

        etapes.forEach((pt) => {
            L.circleMarker(pt.pos, {
                radius: 12, 
                color: '#97f097', 
                fillColor: '#97f097', 
                fillOpacity: 1
            }).addTo(map).bindPopup("<b>" + pt.n + "</b><br><button onclick='alert(\"RA en cours...\")'>📸 VOIR L'ART</button>");
        });

        // --- GÉOLOCALISATION GPS (Ton point bleu de randonneur) ---
        map.locate({setView: false, watch: true});
        var userIcon = L.circleMarker([0,0], {radius: 8, color: '#fff', fillColor: '#3498db', fillOpacity: 1});
        
        map.on('locationfound', function(e) {
            userIcon.setLatLng(e.latlng).addTo(map);
        });
    }
</script>
</body>
</html>
