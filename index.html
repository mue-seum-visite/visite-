<!DOCTYPE html>
<html>
<head>
    <title>MUE.SÉUM - Guide</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin:0; padding:0; }
        #map { height: 100vh; width: 100vw; }
        #search-container { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 85%; }
        #search-input { width: 100%; padding: 12px; border-radius: 25px; border: 2px solid #e91e63; box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-size: 16px; }
    </style>
</head>
<body>

<div id="search-container">
    <input type="text" id="search-input" placeholder="Chercher une ville (Châtelet, Bruxelles...)">
</div>

<div id="map"></div>

<script>
    // Initialisation de la carte sur Châtelet
    var map = L.map('map').setView([50.4022, 4.5268], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap MUE.SÉUM'
    }).addTo(map);

    // Activer le GPS (Point bleu)
    map.locate({setView: true, maxZoom: 16, watch: true});
    map.on('locationfound', function(e) {
        L.marker(e.latlng).addTo(map).bindPopup("Vous êtes ici").openPopup();
    });

    // Tes points de test (On en mettra d'autres après)
    var points = [
        { name: "MUE.SÉUM - Châtelet", city: "chatelet", lat: 50.4022, lng: 4.5268 },
        { name: "MUE.SÉUM - Bruxelles", city: "bruxelles", lat: 50.8503, lng: 4.3517 }
    ];

    var markers = [];
    points.forEach(function(p) {
        var m = L.marker([p.lat, p.lng]).addTo(map).bindPopup("<b>"+p.name+"</b><br><button style='background:#e91e63;color:white;border:none;padding:10px;margin-top:5px;border-radius:5px;'>Lancer l'expérience RA</button>");
        m.city = p.city;
        markers.push(m);
    });

    // Le moteur de recherche
    document.getElementById('search-input').addEventListener('input', function(e) {
        var val = e.target.value.toLowerCase();
        markers.forEach(function(m) {
            if (m.city.includes(val) && val !== "") {
                map.setView(m.getLatLng(), 15);
                m.openPopup();
            }
        });
    });
</script>
</body>
</html>
