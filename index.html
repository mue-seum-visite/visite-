<!DOCTYPE html>
<html lang="fr">
<head>
    <title>MUE.SÉUM - Châtelet</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <meta property="og:title" content="MUE.SÉUM" />
    <meta property="og:description" content="Le passé s'éveille... Une aventure poétique au cœur de l'histoire." />
    <meta property="og:image" content="https://mue-seum-visite.github.io/visite-/share-card.jpg" />

    <style>
        body { margin:0; padding:0; background: #000; color: white; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }
        
        #ui-explorer { height: 100%; overflow-y: auto; transition: opacity 0.8s ease; }
        
        header { background: #000; padding: 40px 20px 10px; text-align: center; }
        header h1 { font-size: 32px; letter-spacing: 5px; font-weight: 900; margin: 0; text-transform: uppercase; color: #fff; }
        .subtitle { font-size: 14px; color: #8e8e93; margin-top: 10px; font-style: italic; letter-spacing: 1px; }

        .search-container { padding: 15px 20px; background: #000; position: sticky; top: 0; z-index: 3000; }
        .search-bar { background: #1c1c1e; border-radius: 20px; padding: 12px 20px; color: #fff; border: 1px solid #333; width: 100%; box-sizing: border-box; font-size: 15px; outline: none; }
        
        .rando-card { background: #1c1c1e; border-radius: 28px; overflow: hidden; margin: 10px 20px 40px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .brand-image { width: 100%; height: 160px; background: url('share-card.jpg') center center / cover no-repeat; border-bottom: 1px solid #333; }
        .old-map-preview { width: 100%; height: 220px; background: url('carte-ancienne-chatelet.jpg') center center / cover no-repeat; border-bottom: 1px solid #333; }
        
        .rando-info { padding: 25px; text-align: center; }
        .rando-title { font-size: 1.6em; font-weight: 800; margin-bottom: 5px; color: #97f097; text-transform: uppercase; }
        .rando-destination { color: #8e8e93; font-size: 14px; margin-bottom: 20px; }

        .stats-box { border-top: 1px solid #333; padding-top: 15px; margin-bottom: 25px; }
        .km-text { font-weight: bold; color: #97f097; display: block; font-size: 18px; margin-bottom: 5px; }
        .accessibility-note { font-size: 10px; color: #666; line-height: 1.3; margin-top: 12px; }

        .btn-demarrer { width: 100%; background: #97f097; color: #000; padding: 22px; border-radius: 20px; font-weight: 900; border: none; cursor: pointer; text-transform: uppercase; font-size: 1.1em; }

        #transition-voyage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 4000; display: none; background: #000; }
        #vortex-map { position: absolute; width: 100%; height: 100%; background: url('carte-ancienne-chatelet.jpg') center center / cover no-repeat; opacity: 0; }

        #map { height: 100vh; width: 100vw; display: none; background: #000; }
        #btn-quitter-carte { position: fixed; top: 25px; right: 20px; z-index: 5000; background: rgba(0,0,0,0.85); color: white; border: 1px solid #97f097; padding: 12px 20px; border-radius: 50px; font-weight: bold; display: none; cursor: pointer; }

        .label-etape { background: #97f097; border: 2px solid #000; border-radius: 5px; color: #000; font-weight: bold; padding: 2px 6px; font-size: 12px; }
        .btn-action { background: #97f097; color: black; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; margin-top: 12px; cursor: pointer; }
        .btn-video { background: #3498db; color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; margin-top: 12px; cursor: pointer; }
        .coq-anim { border-radius: 12px; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="ui-explorer">
        <header>
            <h1>MUE.SÉUM</h1>
            <div class="subtitle">"Le Portail du Temps : L'Art s'éveille"</div>
        </header>

        <div class="search-container">
            <input type="text" class="search-bar" placeholder="🔍 Rechercher un artiste, un lieu...">
        </div>

        <div class="rando-card">
            <div class="brand-image"></div>
            <div class="old-map-preview"></div>
            <div class="rando-info">
                <p class="rando-title">Pierre Paulus</p>
                <p class="rando-destination">Châtelet - L'âme du Pays Noir</p>
                
                <div class="stats-box">
                    <span class="km-text">📏 ENVIRON 2,5 KM</span>
                    <p style="font-size:13px; margin: 8px 0;"><i>"Un sentier d'histoire au rythme de vos pas."</i></p>
                    <p class="accessibility-note">
                        ♿ <b>Note accessibilité :</b> Le tracé historique peut s'avérer difficile en chaise roulante (trottoirs et pavés d'époque). Prudence conseillée.
                    </p>
                </div>

                <button class="btn-demarrer" onclick="lancerVoyage()">Démarrer la balade</button>
            </div>
        </div>
    </div>

    <div id="transition-voyage">
        <div id="vortex-map"></div>
    </div>

    <button id="btn-quitter-carte" onclick="revenirMenu()">✕ QUITTER</button>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map;

        function lancerVoyage() {
            const trans = document.getElementById('transition-voyage');
            const vortex = document.getElementById('vortex-map');
            const explorer = document.getElementById('ui-explorer');
            trans.style.display = 'block';
            explorer.style.opacity = '0';
            setTimeout(() => {
                vortex.style.opacity = '1';
                vortex.style.transition = "transform 4s ease-in, opacity 1.5s";
                vortex.style.transform = "scale(2.5)";
                setTimeout(() => {
                    trans.style.opacity = '0';
                    document.getElementById('map').style.display = 'block';
                    document.getElementById('btn-quitter-carte').style.display = 'block';
                    initMap();
                    setTimeout(() => { trans.style.display = 'none'; explorer.style.display = 'none'; }, 1000);
                }, 3000);
            }, 100);
        }

        function revenirMenu() { location.reload(); }
