<!DOCTYPE html>
<html lang="fr">
<head>
    <title>MUE.SÉUM - Expérience Finale</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; font-family: -apple-system, sans-serif; background: #000; color: white; }
        #map { height: 100vh; width: 100vw; display: none; position: fixed; top: 0; left: 0; }
        .explorer-container { padding: 15px; }
        .card { background: #1c1c1e; border-radius: 16px; overflow: hidden; border: 1px solid #333; margin-top: 20px; }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card-content { padding: 15px; }
        .btn-map { background: #97f097; color: #000; padding: 12px 24px; border-radius: 20px; font-weight: bold; border: none; float: right; cursor: pointer; }
        #back-btn { position: absolute; top: 20px; left: 20px; z-index: 2000; background: white; color: black; width: 40px; height: 40px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        
        /* Interface RA */
        #ra-ui { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 3000; background: black; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .close-ra { position:absolute; top:20px; right:20px; background:white; color:black; padding:10px; border-radius:50%; font-weight:bold; cursor: pointer; z-index: 3001; }
        
        /* TON OEUVRE FLOTTANTE */
        #floating-art { 
            position: absolute; 
            top: 45%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 80%; 
            max-width: 400px;
            border: 5px solid white;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
            pointer-events: none; 
            animation: float 4s ease-in-out infinite; 
        }
        @keyframes float { 
            0% { transform: translate(-50%, -50%) rotate(0deg) translateY(0px); } 
            50% { transform: translate(-50%, -50%) rotate(1deg) translateY(-20px); } 
            100% { transform: translate(-50%, -50%) rotate(0deg) translateY(0px); } 
        }
    </style>
</head>
<body>

<div id="back-btn" onclick="location.reload()">✕</div>

<div id="catalog" class="explorer-container">
    <h2 style="margin-top: 10px;">Circuit Paulus</h2>
    <div class="card">
        <img src="unnamed.jpg">
        <div class="card-content">
            <div style="font-size: 19px; font-weight: bold;">Le Cœur de Châtelet</div>
            <button class="btn-map" onclick="showMap()">🗺️ Aller au point Vert</button>
        </div>
    </div>
</div>

<div id="map"></div>

<div id="ra-ui">
    <div class="close-ra" onclick="closeRA()">✕</div>
    <video id="video" autoplay playsinline></video>
    
    <img id="floating-art" src="https://mue-seum-visite.github.io/visite-/unnamed.jpg" id="target-img">
    
    <div style="position:absolute; bottom:40px; width:100%; text-align:center;">
        <span style="background:rgba(0,0,0,0.8); color:white; padding:12px 20px; border-radius:25px; font-size: 14px;">✨ L'œuvre de Paulus apparaît devant vous</span>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map;
    function showMap() {
        document.getElementById('catalog').style.display = 'none';
        document.getElementById('map').style.display = 'block';
        document.getElementById('back-btn').style.display = 'flex';
        
        map = L.map('map').setView([50.4022, 4.5268], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        L.circleMarker([50.4022, 4.5268], {radius: 15, color: '#2ecc71', fillColor: '#2ecc71', fillOpacity: 1}).addTo(map)
            .bindPopup("<b>POINT D'INTÉRÊT</b><br><button style='background:#ff4b81; color:white; border:none; padding:10px; border-radius:8px; margin-top:10px; cursor:pointer;' onclick='openRA()'>📸 VOIR L'ŒUVRE ICI</button>")
            .openPopup();
    }

    async function openRA() {
        // Pour le test, on utilise l'image que tu as déjà sur ton github (unnamed.jpg) 
        // ou on peut mettre l'URL directe de ton image Grok si elle est publique.
        document.getElementById('ra-ui').style.display = 'block';
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('video').srcObject = stream;
        } catch (err) {
            alert("Caméra non disponible");
        }
    }

    function closeRA() {
        const video = document.getElementById('video');
        if (video.srcObject) {
            video.srcObject.getTracks().forEach(track => track.stop());
        }
        document.getElementById('ra-ui').style.display = 'none';
    }
</script>
</body>
</html>
