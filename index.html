<!DOCTYPE html>
<html lang="fr">
<head>
    <title>MUE.SÉUM - Châtelet</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; font-family: -apple-system, sans-serif; background: #000; color: white; }
        #map { height: 100vh; width: 100vw; display: none; position: fixed; top: 0; left: 0; }
        .explorer-container { padding: 15px; }
        .card { background: #1c1c1e; border-radius: 16px; overflow: hidden; border: 1px solid #333; margin-top: 20px; }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card-content { padding: 15px; }
        .btn-map { background: #97f097; color: #000; padding: 12px 24px; border-radius: 20px; font-weight: bold; border: none; float: right; cursor: pointer; }
        #back-btn { position: absolute; top: 20px; left: 20px; z-index: 2000; background: white; color: black; width: 40px; height: 40px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        .ra-btn { background: #ff4b81; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
        
        /* Style pour le marqueur Départ */
        .start-icon { background-color: #2ecc71; border: 2px solid white; border-radius: 50%; }
    </style>
</head>
<body>

<div id="back-btn" onclick="location.reload()">✕</div>

<div id="catalog" class="explorer-container">
    <h2 style="margin-top: 10px;">Circuit Paulus</h2>
    <div class="card">
        <img src="unnamed.jpg">
        <div class="card-content">
            <div style="font-size: 19px; font-weight: bold;">Le Cœur de Châtelet</div>
            <div style="color: #8e8e93; font-size: 14px; margin-bottom: 15px;">Boucle interactive • Suivi GPS</div>
            <button class="btn-map" onclick="showMap()">🗺️ Démarrer la balade</button>
        </div>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map;
    function showMap() {
        document.getElementById('catalog').style.display = 'none';
        document.getElementById('map').style.display = 'block';
        document.getElementById('back-btn').style.display = 'flex';
        
        // On crée la carte sans forcer la vue tout de suite
        map = L.map('map', {zoomControl: true}); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        // TRACÉ BLEU ÉPAIS (Ton itinéraire)
        var routePoints = [
            [50.4022, 4.5268], // A: Départ
            [50.4038, 4.5305], // B
            [50.4050, 4.5325], // C
            [50.4010, 4.5345], // D
            [50.4022, 4.5268]  // E: Retour
        ];
        var polyline = L.polyline(routePoints, {color: '#007aff', weight: 8, opacity: 0.7}).addTo(map);

        // MARQUEUR DÉPART SPÉCIAL (Vert)
        L.circleMarker([50.4022, 4.5268], {radius: 12, color: '#2ecc71', fillColor: '#2ecc71', fillOpacity: 1}).addTo(map)
            .bindPopup("<b>POINT DE DÉPART</b><br>Hôtel de Ville");

        // GÉOLOCALISATION : On cherche l'utilisateur
        map.locate({setView: true, maxZoom: 16, watch: true});

        map.on('locationfound', function(e) {
            // On ajoute ton point bleu
            L.circle(e.latlng, {radius: e.accuracy/2, color: '#3498db'}).addTo(map);
            L.marker(e.latlng).addTo(map).bindPopup("Vous êtes ici").openPopup();
        });

        // Les étapes RA
        var steps = [
            {pos: [50.4038, 4.5305], title: "Étape B", desc: "Regardez le bâtiment à droite."},
            {pos: [50.4050, 4.5325], title: "Étape C", desc: "L'art au bord de l'eau."}
        ];

        steps.forEach(function(s) {
            L.marker(s.pos).addTo(map)
                .bindPopup("<b>"+s.title+"</b><br>"+s.desc+"<br><button class='ra-btn' onclick='openRA()'>📸 VOIR EN RA</button>");
        });
    }

    function openRA() {
        alert("Caméra RA : Analyse de l'environnement...");
    }
</script>
</body>
</html>
