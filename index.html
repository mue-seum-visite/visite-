<!DOCTYPE html>
<html lang="fr">
<head>
    <title>MUE.SÉUM - Tracé Réel</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; background: #000; color: white; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; display: none; }
        .explorer-container { padding: 30px; text-align: center; }
        .btn-start { background: #97f097; color: #000; padding: 15px 30px; border-radius: 30px; font-weight: bold; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div id="catalog" class="explorer-container">
    <h1 style="color:#97f097">MUE.SÉUM</h1>
    <p>Le tracé suit désormais les rues et la passerelle.</p>
    <button class="btn-start" onclick="showMap()">DÉMARRER LE PARCOURS</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map;
    function showMap() {
        document.getElementById('catalog').style.display = 'none';
        document.getElementById('map').style.display = 'block';
        
        map = L.map('map').setView([50.4045, 4.5265], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // --- TRACÉ CORRIGÉ : IL SUIT LES RUES (PAS DE PLONGÉE DANS LA SAMBRE) ---
        var cheminDesRues = [
            [50.40446, 4.52308], // 1. Hôtel de Ville
            [50.40455, 4.52220], // Rue de la Montagne
            [50.40697, 4.52175], // 2. Rue des Gravelles
            [50.40800, 4.52150], // Virage vers Allée de la Sambre
            [50.40829, 4.52055], // 3. Allée de la Sambre
            [50.40850, 4.52100], // Retour sur le quai
            [50.40870, 4.52380], // ENTRÉE PASSERELLE (Côté nord)
            [50.40830, 4.52420], // SORTIE PASSERELLE (Côté sud)
            [50.40672, 4.52504], // 4. Rue Paulus
            [50.40500, 4.52450], // Rue vers l'Hôtel de Ville
            [50.40446, 4.52308]  // 5. Retour départ
        ];

        // Dessin de la ligne bleue
        L.polyline(cheminDesRues, {
            color: '#3498db', 
            weight: 6, 
            opacity: 0.9,
            lineJoin: 'round'
        }).addTo(map);

        // --- LES MARQUEURS (TES TABLEAUX) ---
        var etapes = [
            [50.40446, 4.52308],
            [50.40697, 4.52175],
            [50.40829, 4.52055],
            [50.40672, 4.52504]
        ];

        etapes.forEach((pos, i) => {
            L.circleMarker(pos, {radius: 10, color: '#97f097', fillColor: '#97f097', fillOpacity: 1})
            .addTo(map)
            .bindPopup("<b>Tableau " + (i+1) + "</b>");
        });

        map.locate({setView: false, watch: true});
        map.on('locationfound', function(e) {
            L.circleMarker(e.latlng, {radius: 6, color: '#fff', fillColor: '#3498db', fillOpacity: 1}).addTo(map);
        });
    }
</script>
</body>
</html>
