<!DOCTYPE html>
<html lang="fr">
<head>
    <title>MUE.SÉUM - Circuit Pierre Paulus</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; font-family: 'Segoe UI', sans-serif; background: #000; color: white; }
        #map { height: 100vh; width: 100vw; display: none; position: fixed; top: 0; left: 0; }
        .explorer-container { padding: 30px 20px; text-align: center; background: #000; min-height: 100vh; }
        .search-bar { background: #1c1c1e; padding: 12px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; color: #8e8e93; text-align: left; }
        .card { background: #1c1c1e; border-radius: 25px; overflow: hidden; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card img { width: 100%; height: 300px; object-fit: cover; }
        .btn-start { background: #97f097; color: #000; padding: 18px 40px; border-radius: 40px; font-weight: bold; border: none; margin: 25px 0; cursor: pointer; font-size: 18px; }
        #ra-ui { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 3000; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .close-ra { position:absolute; top:30px; right:20px; background:rgba(255,255,255,0.8); color:black; width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; z-index: 3001; }
        #floating-art { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 450px; mix-blend-mode: multiply; filter: contrast(1.2) brightness(1.1); animation: float-animation 5s ease-in-out infinite; pointer-events: none; }
        #signature { position: absolute; bottom: 32%; right: 18%; font-size: 35px; font-family: 'Times New Roman', serif; font-weight: bold; color: #cc0000; opacity: 0; animation: appear-signature 2s ease-out 2s forwards; text-shadow: 1px 1px 2px rgba(255,255,255,0.5); }
        @keyframes float-animation { 0%, 100% { transform: translate(-50%, -50%) translateY(0px) rotate(0deg); } 50% { transform: translate(-50%, -50%) translateY(-25px) rotate(1deg); } }
        @keyframes appear-signature { from { opacity: 0; } to { opacity: 0.9; } }
        #back-btn { display:none; position:fixed; top:20px; left:20px; z-index:4000; background:white; color:black; padding:10px 20px; border-radius:20px; font-weight:bold; border:none; }
    </style>
</head>
<body>

<button id="back-btn" onclick="location.reload()">← RETOUR</button>

<div id="catalog" class="explorer-container">
    <div class="search-bar">🔍 Rechercher un circuit...</div>
    <h1 style="font-size: 40px; margin-bottom: 5px; color: #97f097;">MUE.SÉUM</h1>
    <p style="color: #8e8e93; margin-bottom: 30px;">L'art s'invite dans la rue</p>
    <div class="card">
        <img src="IMG_4536.jpg">
        <div style="padding:20px">
            <h2 style="margin:0">Circuit Pierre Paulus</h2>
            <p style="color: #8e8e93; font-size: 14px;">Parcours artistique au cœur de Châtelet</p>
            <button class="btn-start" onclick="showMap()">DÉMARRER LA BALADE</button>
        </div>
    </div>
</div>

<div id="map"></div>

<div id="ra-ui">
    <div class="close-ra" onclick="closeRA()">✕</div>
    <video id="video" autoplay playsinline></video>
    <img id="floating-art" src="IMG_4536.jpg">
    <div id="signature">¶P</div>
    <div style="position:absolute; bottom:40px; width:100%; text-align:center;">
        <span style="background:rgba(0,0,0,0.7); color:white; padding:12px 25px; border-radius:30px; font-size: 14px;">Point 1 : Le Coq Hardi</span>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map;
    function showMap() {
        document.getElementById('catalog').style.display = 'none';
        document.getElementById('map').style.display = 'block';
        document.getElementById('back-btn').style.display = 'block';
        
        // Coordonnées ajustées selon ton tracé IMAP
        map = L.map('map', {zoomControl: false}).setView([50.4035, 4.5275], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        var points = [
            [50.4022, 4.5268], // Point 1: Hôtel de Ville
            [50.4042, 4.5265], // Point 2: Vers la Sambre
            [50.4048, 4.5295], // Point 3: Quai
            [50.4032, 4.5318], // Point 4: Rue Paulus
            [50.4010, 4.5280]  // Point 5: Église / Retour
        ];

        // Ligne bleue du parcours
        L.polyline(points, {color: '#3498db', weight: 5, opacity: 0.7}).addTo(map);

        // Ajout des marqueurs
        points.forEach((pos, i) => {
            L.circleMarker(pos, {radius: 12, color: '#97f097', fillColor: '#97f097', fillOpacity: 1})
            .addTo(map)
            .bindPopup(`<div style="text-align:center"><b>Étape ${i+1}</b><br><button onclick="openRA()" style="background:#ff4b81; color:white; border:none; padding:10px; border-radius:8px; margin-top:10px; cursor:pointer">📸 VOIR L'ART</button></div>`);
        });
    }

    async function openRA() {
        document.getElementById('ra-ui').style.display = 'block';
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('video').srcObject = stream;
        } catch (err) {
            alert("Erreur : La caméra doit être autorisée pour la RA.");
        }
    }

    function closeRA() {
        const video = document.getElementById('video');
        if (video.srcObject) {
            video.srcObject.getTracks().forEach(track => track.stop());
        }
        document.getElementById('ra-ui').style.display = 'none';
    }
</script>
</body>
</html>
