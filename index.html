<!DOCTYPE html>
<html lang="fr">
<head>
    <title>MUE.SÉUM - Circuit Pierre Paulus</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; font-family: 'Segoe UI', sans-serif; background: #000; color: white; }
        #map { height: 100vh; width: 100vw; display: none; position: fixed; top: 0; left: 0; }
        .explorer-container { padding: 30px 20px; text-align: center; background: #000; min-height: 100vh; }
        .search-bar { background: #1c1c1e; padding: 12px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; color: #8e8e93; text-align: left; }
        .card { background: #1c1c1e; border-radius: 25px; overflow: hidden; border: 1px solid #333; }
        .card img { width: 100%; height: 300px; object-fit: cover; }
        .btn-start { background: #97f097; color: #000; padding: 18px 40px; border-radius: 40px; font-weight: bold; border: none; margin: 25px 0; cursor: pointer; font-size: 18px; }
        #ra-ui { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 3000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .close-ra { position:absolute; top:30px; right:20px; background:rgba(255,255,255,0.8); color:black; width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; z-index: 3001; }
        #floating-art { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 450px; mix-blend-mode: multiply; filter: contrast(1.2); animation: float-animation 5s ease-in-out infinite; }
        @keyframes float-animation { 0%, 100% { transform: translate(-50%, -50%) translateY(0px); } 50% { transform: translate(-50%, -50%) translateY(-25px); } }
    </style>
</head>
<body>

<div id="catalog" class="explorer-container">
    <div class="search-bar">🔍 Rechercher un circuit...</div>
    <h1 style="color:#97f097">MUE.SÉUM</h1>
    <div class="card">
        <img src="IMG_4536.jpg"> 
        <div style="padding:20px">
            <h2>Circuit Pierre Paulus</h2>
            <p style="color:#8e8e93">Circuit en 5 étapes le long de la Sambre</p>
            <button class="btn-start" onclick="showMap()">DÉMARRER LA BALADE</button>
        </div>
    </div>
</div>

<div id="map"></div>

<div id="ra-ui">
    <div class="close-ra" onclick="closeRA()">✕</div>
    <video id="video" autoplay playsinline></video>
    <img id="floating-art" src="IMG_4536.jpg">
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map;
    function showMap() {
        document.getElementById('catalog').style.display = 'none';
        document.getElementById('map').style.display = 'block';
        
        map = L.map('map').setView([50.4060, 4.5230], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Tes 5 points GPS réels
        var steps = [
            [50.40423, 4.52366], // P1: Pont
            [50.40690, 4.52486], // P2: Passerelle
            [50.40732, 4.52198], // P3: Rive Gauche Sud
            [50.40872, 4.52061], // P4: Rive Gauche Nord
            [50.40475, 4.52233], // P5: Retour Rive Gauche
            [50.40423, 4.52366]  // Retour final P1
        ];

        // Le tracé bleu qui suit les berges et les ponts
        L.polyline(steps, {color: '#3498db', weight: 5, opacity: 0.8, lineJoin: 'round'}).addTo(map);

        steps.forEach((pos, i) => {
            if(i < 5) { // On ne met pas de marqueur double sur le point de retour
                L.circleMarker(pos, {radius: 12, color: '#97f097', fillColor: '#97f097', fillOpacity: 1})
                .addTo(map)
                .bindPopup(`<b>Étape ${i+1}</b><br><button onclick="openRA()" style="background:#ff4b81; color:white; border:none; padding:10px; border-radius:8px; margin-top:10px;">📸 VOIR L'ART</button>`);
            }
        });
    }

    async function openRA() {
        document.getElementById('ra-ui').style.display = 'block';
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video').srcObject = stream;
    }

    function closeRA() {
        location.reload();
    }
</script>
</body>
</html>
