<!DOCTYPE html>
<html lang="fr">
<head>
    <title>MUE.SÉUM - Châtelet</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; background: #000; color: white; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }
        
        /* INTERFACE CATALOGUE */
        #ui-explorer { height: 100%; overflow-y: auto; transition: opacity 0.8s ease; }
        .search-container { padding: 20px 15px 10px; background: #000; position: sticky; top: 0; z-index: 3000; }
        .search-bar { background: #1c1c1e; border-radius: 12px; padding: 12px 15px; color: #8e8e93; border: 1px solid #333; }
        
        .rando-card { background: #1c1c1e; border-radius: 24px; overflow: hidden; margin: 10px 15px 25px; border: 1px solid #333; }
        .rando-image { width: 100%; height: 220px; background: url('unnamed (1).jpg') center center / cover no-repeat; }
        
        .rando-info { padding: 20px; text-align: center; }
        .rando-title { font-size: 1.4em; font-weight: 700; margin-bottom: 15px; }

        /* BOUTON ITINÉRAIRE */
        .btn-itineraire { 
            display: block; background: transparent; color: #3498db; padding: 12px; 
            border-radius: 12px; font-weight: 600; border: 1px solid #3498db; 
            text-decoration: none; font-size: 0.85em; margin-bottom: 15px;
            transition: background 0.3s;
        }

        /* BOUTON DÉMARRER */
        .btn-demarrer { width: 100%; background: #97f097; color: #000; padding: 18px; border-radius: 14px; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; font-size: 1.1em; }

        /* TRANSITION VOYAGE DANS LE TEMPS */
        #transition-voyage {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 4000;
            display: none; background: #000; transition: opacity 1.5s ease-in-out;
        }
        #carte-1900 {
            position: absolute; width: 100%; height: 100%;
            background: url('unnamed (1).jpg') center center / cover no-repeat;
            opacity: 0; transition: opacity 1s ease-in-out;
            animation: zoomHistoire 5s ease-out forwards;
        }
        @keyframes zoomHistoire { 0% { transform: scale(1); } 100% { transform: scale(1.15); } }

        /* CARTE */
        #map { height: 100vh; width: 100vw; display: none; background: #000; }

        /* BOUTON QUITTER */
        #btn-quitter-carte {
            position: fixed; top: 20px; right: 20px; z-index: 5000; 
            background: rgba(0,0,0,0.7); color: white; border: 1px solid #97f097; 
            padding: 10px 15px; border-radius: 12px; font-weight: bold; 
            display: none; font-family: sans-serif; cursor: pointer;
        }

        /* ÉTIQUETTES ÉTAPES */
        .label-etape {
            background: #97f097; border: 2px solid #000; border-radius: 5px;
            color: #000; font-weight: bold; padding: 2px 5px; font-size: 12px;
        }

        .coq-anim { border-radius: 12px; width: 100%; margin-top: 10px; animation: coqVivant 4s infinite alternate ease-in-out; }
        @keyframes coqVivant { 0% { transform: scale(1); } 100% { transform: scale(1.03); } }
        
        .btn-action { background: #97f097; color: black; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-video { background: #3498db; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="ui-explorer">
        <div class="search-container"><div class="search-bar">🔍 Rechercher...</div></div>
        <div class="rando-card">
            <div class="rando-image"></div>
            <div class="rando-info">
                <p class="rando-title">Circuit Pierre Paulus</p>
                <a href="https://www.google.com/maps/dir/?api=1&destination=50.4044627,4.5230877" target="_blank" class="btn-itineraire">
                    📍 CALCULER L'ITINÉRAIRE JUSQU'AU DÉPART
                </a>
                <button class="btn-demarrer" onclick="lancerVoyage()">Démarrer la balade</button>
            </div>
        </div>
    </div>

    <button id="btn-quitter-carte" onclick="revenirMenu()">✕ QUITTER</button>

    <div id="transition-voyage"><div id="carte-1900"></div></div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map;

        function lancerVoyage() {
            document.getElementById('transition-voyage').style.display = 'block';
            document.getElementById('ui-explorer').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('ui-explorer').style.display = 'none';
                document.getElementById('carte-1900').style.opacity = '1';
                setTimeout(() => {
                    document.getElementById('transition-voyage').style.opacity = '0';
                    document.getElementById('map').style.display = 'block';
                    document.getElementById('btn-quitter-carte').style.display = 'block';
                    initMap();
                    setTimeout(() => { document.getElementById('transition-voyage').style.display = 'none'; }, 1500);
                }, 3500); 
            }, 800);
        }

        function revenirMenu() {
            document.getElementById('map').style.display = 'none';
            document.getElementById('btn-quitter-carte').style.display = 'none';
            document.getElementById('ui-explorer').style.display = 'block';
            setTimeout(() => { document.getElementById('ui-explorer').style.opacity = '1'; }, 50);
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        function initMap() {
            if (!map) {
                map = L.map('map').setView([50.407, 4.522], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

                var tracéCoord = [[50.404741, 4.523157], [50.405149, 4.524318], [50.406281, 4.526237], [50.406527, 4.525638], [50.40675, 4.524963], [50.407117, 4.523852], [50.40651, 4.523013], [50.406253, 4.522654], [50.406561, 4.522122], [50.406818, 4.521565], [50.408204, 4.523373], [50.408706, 4.522609], [50.408878, 4.521914], [50.40911, 4.521411], [50.409005, 4.520713], [50.408489, 4.520219], [50.407981, 4.519698], [50.407497, 4.518906], [50.407638, 4.518756], [50.406828, 4.519497], [50.406623, 4.519893], [50.406276, 4.52026], [50.405674, 4.521287], [50.405391, 4.52133], [50.404547, 4.521566], [50.404603, 4.522819], [50.404492, 4.523032]];
                L.polyline(tracéCoord, {color: '#3498db', weight: 6, opacity: 0.8}).addTo(map);

                var pointsCulturels = [
                    { latlng: [50.4044627, 4.5230877], titre: "Hôtel de Ville - Étape 1", isPaulus: true },
                    { latlng: [50.4067226, 4.5250463], titre: "Maison Natale - Étape 2", isMaison: true },
                    { latlng: [50.4069696, 4.5217572], titre: "Rue des Gravelles - Étape 3", isGravelles: true },
                    { latlng: [50.4082915, 4.5205504], titre: "Allée de la Sambre - Étape 4", isSambre: true }, 
                    { latlng: [50.4046263, 4.5221912], titre: "Rue Goswin - Étape 5", isEtape5: true }
                ];

                pointsCulturels.forEach((pt, index) => {
                    let content = `<div style="color:black; text-align:center; font-family: sans-serif; padding: 5px;"><b>${pt.titre}</b><br>`;
                    if(pt.isPaulus) {
                        content += `<img src="unnamed.jpg" class="coq-anim">`;
                        content += `<p style="font-size:12px; margin-top:8px;"><i>"Le passé s'éveille... Laissez le Maître vous ouvrir les portes de son univers."</i></p>`;
                        content += `<button class="btn-action" onclick="window.location.href='coq-ar.html'">✨ RENCONTRE AVEC LE MAÎTRE</button>`;
                    } else if(pt.isMaison) {
                        content += `<p style="font-size:12px; margin-top:8px; line-height:1.4;"><i>"Venez découvrir la maison natale de Pierre Paulus..."</i></p>`;
                    } else if(pt.isGravelles) {
                        content += `<p style="font-size:11px;">La vie quotidienne en 1920.</p>`;
                        content += `<button class="btn-video" onclick="window.location.href='etape2.html'">🎞️ VOIR LES GRAVELLES</button>`;
                    } else if(pt.isSambre) {
                        content += `<p style="font-size:11px;">Le travail sur le quai en 1920.</p>`;
                        content += `<button class="btn-video" onclick="window.location.href='sambre-ar.html'">⏳ VOIR 1920 (RA)</button>`;
                    } else if(pt.isEtape5) {
                        content += `<p style="font-size:11px;">L'usine et le mineur au travail.</p>`;
                        content += `<button class="btn-video" onclick="window.location.href='etape4.html'">⚒️ VOIR L'USINE (RA)</button>`;
                    }
                    content += `</div>`;

                    var marker = L.circleMarker(pt.latlng, { radius: 12, color: '#000', weight: 2, fillColor: '#97f097', fillOpacity: 1 }).addTo(map);
                    marker.bindTooltip("Étape " + (index+1), { permanent: true, direction: 'top', className: 'label-etape', offset: [0, -10] });
                    marker.bindPopup(content);
                });

                map.locate({setView: false, watch: true});
                map.on('locationfound', function(e) {
                    L.circleMarker(e.latlng, {radius: 7, color: '#fff', fillColor: '#3498db', fillOpacity: 1}).addTo(map);
                });
            }
            setTimeout(() => { map.invalidateSize(); }, 200);
        }

        window.addEventListener('load', function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('map') === 'true') {
                document.getElementById('ui-explorer').style.display = 'none';
                document.getElementById('map').style.display = 'block';
                document.getElementById('btn-quitter-carte').style.display = 'block';
                initMap();
            }
        });
    </script>
</body>
</html>
