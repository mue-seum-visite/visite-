<!DOCTYPE html>
<html lang="fr">
<head>
    <title>MUE.SÉUM - Circuit Pierre Paulus</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; font-family: sans-serif; background: #000; color: white; }
        #map { height: 100vh; width: 100vw; display: none; }
        .explorer-container { padding: 30px 20px; text-align: center; }
        .card { background: #1c1c1e; border-radius: 20px; overflow: hidden; border: 1px solid #333; margin-top: 20px; }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .btn-start { background: #97f097; color: #000; padding: 15px 30px; border-radius: 30px; font-weight: bold; border: none; margin: 20px 0; cursor: pointer; }
    </style>
</head>
<body>

<div id="catalog" class="explorer-container">
    <h1 style="color:#97f097">MUE.SÉUM</h1>
    <div class="card">
        <img src="IMG_4536.jpg"> 
        <div style="padding:15px">
            <h2>Circuit Pierre Paulus</h2>
            <button class="btn-start" onclick="showMap()">DÉMARRER LE PARCOURS</button>
        </div>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map;
    function showMap() {
        document.getElementById('catalog').style.display = 'none';
        document.getElementById('map').style.display = 'block';
        
        // Centre la carte sur Châtelet
        map = L.map('map').setView([50.4035, 4.5275], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // --- LES COORDONNÉES GPS DU TRACÉ (LA LIGNE BLEUE) ---
        var traceGPS = [
            [50.40220, 4.52680], // Point 1 : Départ
            [50.40330, 4.52670], // Passage virage
            [50.40420, 4.52650], // Point 2 : Sambre
            [50.40455, 4.52850], // Passage le long du quai
            [50.40485, 4.53065], // ENTRÉE PASSERELLE
            [50.40430, 4.53120], // SORTIE PASSERELLE
            [50.40325, 4.53185], // Point 4 : Rue Paulus
            [50.40150, 4.53000], // Passage retour
            [50.40095, 4.52810]  // Point 5 : Église
        ];

        // On dessine la ligne bleue sur la carte
        L.polyline(traceGPS, {color: '#3498db', weight: 6, opacity: 0.9}).addTo(map);

        // --- LES 5 POINTS D'ÉTAPES (MARQUEURS VERTS) ---
        var pointsEtapes = [
            [50.40220, 4.52680], // Étape 1
            [50.40420, 4.52650], // Étape 2
            [50.40485, 4.53065], // Étape 3 (Passerelle)
            [50.40325, 4.53185], // Étape 4
            [50.40095, 4.52810]  // Étape 5
        ];

        pointsEtapes.forEach((pos, i) => {
            L.circleMarker(pos, {radius: 12, color: '#97f097', fillColor: '#97f097', fillOpacity: 1})
            .addTo(map)
            .bindPopup(`<b>Étape ${i+1}</b><br><button onclick="alert('Ouverture RA...')">📸 VOIR L'ART</button>`);
        });

        // Géolocalisation de l'utilisateur (le point bleu qui bouge)
        map.locate({setView: false, watch: true});
        map.on('locationfound', function(e) {
            var maPosition = L.circleMarker(e.latlng, {radius: 8, color: '#FFFFFF', fillColor: '#3498db', fillOpacity: 1}).addTo(map);
            maPosition.bindPopup("Vous êtes ici").openPopup();
        });
    }
</script>
</body>
</html>
