<!DOCTYPE html>
<html lang="fr">
<head>
    <title>MUE.SÉUM - Châtelet</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; font-family: sans-serif; background: #000; color: white; }
        #map { height: 100vh; width: 100vw; display: none; }
        .explorer-container { padding: 30px 20px; text-align: center; }
        .card { background: #1c1c1e; border-radius: 20px; overflow: hidden; border: 1px solid #333; margin-top: 20px; }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .btn-start { background: #97f097; color: #000; padding: 15px 30px; border-radius: 30px; font-weight: bold; border: none; margin: 20px 0; cursor: pointer; }
    </style>
</head>
<body>

<div id="catalog" class="explorer-container">
    <h1 style="color:#97f097">MUE.SÉUM</h1>
    <div class="card">
        <img src="https://raw.githubusercontent.com/ton-pseudo/ton-repo/main/IMG_4536.jpg" onerror="this.src='https://via.placeholder.com/400x250?text=Circuit+Pierre+Paulus'"> 
        <div style="padding:15px">
            <h2>Circuit Pierre Paulus</h2>
            <p>Suivez le tracé bleu pour découvrir les œuvres.</p>
            <button class="btn-start" onclick="showMap()">DÉMARRER LE PARCOURS</button>
        </div>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map;
    function showMap() {
        document.getElementById('catalog').style.display = 'none';
        document.getElementById('map').style.display = 'block';
        
        // On centre la carte sur le milieu de ton tracé
        map = L.map('map').setView([50.4035, 4.5275], 16);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // --- TON TRACÉ UMAP EXACT (COPIÉ DE TON LIEN) ---
        var traceUmap = [
            [50.40224, 4.52684], // Départ Hôtel de Ville
            [50.40328, 4.52674], // Angle Rue des Gravelles
            [50.40421, 4.52654], // Arrivée sur la Sambre
            [50.40465, 4.52932], // Long du Quai du Rivage
            [50.40488, 4.53066], // ENTRÉE PASSERELLE (Côté Quai)
            [50.40432, 4.53118], // SORTIE PASSERELLE (Côté Paulus)
            [50.40324, 4.53183], // Rue Pierre Paulus
            [50.40165, 4.53022], // Rue de l'Enseignement
            [50.40098, 4.52805]  // Église (Fin)
        ];

        // Dessin de la ligne bleue de randonnée
        var polyline = L.polyline(traceUmap, {
            color: '#3498db', 
            weight: 6, 
            opacity: 0.8,
            lineJoin: 'round'
        }).addTo(map);

        // Ajout des marqueurs d'étapes (les 5 points de ta photo)
        var etapes = [
            {pos: [50.40224, 4.52684], t: "Hôtel de Ville"},
            {pos: [50.40421, 4.52654], t: "Bord de Sambre"},
            {pos: [50.40488, 4.53066], t: "La Passerelle"},
            {pos: [50.40324, 4.53183], t: "Rue Pierre Paulus"},
            {pos: [50.40098, 4.52805], t: "Église / Arrivée"}
        ];

        etapes.forEach(function(etape, index) {
            L.circleMarker(etape.pos, {
                radius: 10,
                color: '#2ecc71',
                fillColor: '#97f097',
                fillOpacity: 1
            }).addTo(map).bindPopup("<b>Étape " + (index+1) + "</b><br>" + etape.t);
        });

        // --- GÉOLOCALISATION EN TEMPS RÉEL ---
        map.locate({setView: false, watch: true});
        
        var userMarker;
        map.on('locationfound', function(e) {
            if (userMarker) {
                userMarker.setLatLng(e.latlng);
            } else {
                userMarker = L.circleMarker(e.latlng, {
                    radius: 8,
                    color: '#fff',
                    fillColor: '#3498db',
                    fillOpacity: 1
                }).addTo(map).bindPopup("Vous êtes ici");
            }
        });
    }
</script>
</body>
</html>
