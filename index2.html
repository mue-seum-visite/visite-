<!DOCTYPE html>
<html lang="fr">
<head>
    <title>MUE.SÉUM - Pont-de-Loup</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style2.css" />

    <style>
        .brand-image {
            width: 100% !important;
            height: 280px !important; 
            background-color: #000 !important;
            border-bottom: 1px solid #333;
        }

        /* Style de la transition forcé */
        #transition-voyage {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000;
            z-index: 99999; /* Au-dessus de tout */
            display: none; 
            justify-content: center;
            align-items: center;
            opacity: 1;
            transition: opacity 0.8s ease-out;
        }

        #map, #btn-quitter-carte, #poetic-footer {
            display: none;
        }

        #ui-explorer {
            display: block; 
        }
    </style>
</head>
<body>

    <div id="ui-explorer">
        <header>
            <h1>MUE.SÉUM</h1>
            <div class="subtitle">"Le Portail du Temps : L'Art s'éveille"</div>
        </header>

        <div class="rando-card">
            <div class="brand-image" style="background-image: url('photo2.jpg'); background-size: contain; background-repeat: no-repeat; background-position: center;"></div>
            
            <div class="rando-info">
                <p class="rando-title">Le Circuit des Mémoires & <span class="rando-highlight" style="color: #8cb6d1;">Pont-de-Loup</span></p>
                <p style="color: #8cb6d1; font-weight: bold; margin: 5px 0;">📍 Itinéraire d'environ 0,4 km</p>
                
                <div id="distance-gps">Calcul de votre position...</div>
                
                <p style="font-size: 0.75em; color: #aaa; font-style: italic; margin: 10px 0; border-top: 1px solid #333; padding-top: 8px;">
                    * Ici, le temps s'écoule avec douceur.
                </p>

                <button class="btn-demarrer" onclick="PorteDuTemps()">Ouvrir la porte du temps</button>
                <button class="btn-google" onclick="allerAuDepart2()">Rejoindre la Tour : Itinéraire</button>
            </div>
        </div>
    </div>

    <div id="transition-voyage">
        <video id="video-vortex" playsinline muted style="width: 100%; height: 100%; object-fit: cover;">
            <source src="detour-ancienne.mp4" type="video/mp4">
        </video>
    </div>

    <button id="btn-quitter-carte" onclick="window.location.href='index.html'">✕ QUITTER LE PARCOURS</button>
    
    <div id="map"></div>
    
    <div id="poetic-footer">
        <p id="poetic-text">L'eau murmure les secrets de la tour...</p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app2.js"></script>

    <script>
        function PorteDuTemps() {
            const transition = document.getElementById('transition-voyage');
            const video = document.getElementById('video-vortex');
            const ui = document.getElementById('ui-explorer');

            // 1. On cache l'interface
            ui.style.display = 'none';
            
            // 2. On affiche le conteneur de vidéo
            transition.style.display = 'flex';
            transition.style.opacity = '1';
            
            // 3. On lance la vidéo
            video.currentTime = 0; // On repart du début
            video.play().then(() => {
                console.log("Vidéo lancée avec succès");
            }).catch(e => {
                console.error("Erreur lecture vidéo:", e);
                // Si la vidéo bloque, on passe quand même à la carte après 1s
                setTimeout(AfficherLaCarte, 1000);
            });

            // 4. On prépare la transition vers la carte
            // Ajuste le temps (4500ms) selon la durée exacte de ta vidéo
            setTimeout(AfficherLaCarte, 4500); 
        }

        function AfficherLaCarte() {
            const transition = document.getElementById('transition-voyage');
            transition.style.opacity = '0';
            
            setTimeout(() => {
                transition.style.display = 'none';
                document.getElementById('map').style.display = 'block';
                document.getElementById('btn-quitter-carte').style.display = 'block';
                document.getElementById('poetic-footer').style.display = 'block';
                
                // Initialisation de la carte (définie dans app2.js)
                if (typeof initMap2 === 'function') {
                    initMap2();
                    setTimeout(() => { if(window.map2) window.map2.invalidateSize(); }, 300);
                }
            }, 800);
        }

        // Gestion du retour direct via URL
        window.addEventListener('load', function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('map') === 'true') {
                document.getElementById('ui-explorer').style.display = 'none';
                document.getElementById('map').style.display = 'block';
                document.getElementById('btn-quitter-carte').style.display = 'block';
                document.getElementById('poetic-footer').style.display = 'block';
                if (typeof initMap2 === 'function') {
                    initMap2();
                }
            }
        });
    </script>
</body>
</html>
