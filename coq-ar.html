<!DOCTYPE html>
<html>
<head>
    <title>MUE.SÉUM - Selfie Pierre Paulus</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        .ui-overlay {
            position: fixed; bottom: 30px; left: 0; width: 100%;
            display: flex; justify-content: center; z-index: 1000;
        }
        .btn-retour {
            background: #97f097; color: black; border: 2px solid black;
            padding: 15px 30px; border-radius: 50px; font-weight: bold;
            text-decoration: none; font-family: sans-serif; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #instructions {
            position: fixed; top: 20px; width: 100%; text-align: center;
            color: white; font-family: sans-serif; z-index: 1000;
            background: rgba(0,0,0,0.6); padding: 10px 0; font-size: 14px;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="instructions">Cadrez votre visage et faites une capture d'écran !</div>

    <div class="ui-overlay">
        <a href="index.html" class="btn-retour">⬅ Revenir à la Carte</a>
    </div>

    <a-scene embedded arjs='sourceType: webcam; debugUIEnabled: false;' vr-mode-ui="enabled: false">
        
        <a-assets>
            <img id="coq-img" src="IMG_4536.jpg">
        </a-assets>

        <a-plane src="#coq-img" 
                 position="0 1.5 -1" 
                 width="1.2" height="1.6" 
                 material="transparent: true; opacity: 0.5; shader: flat; side: double;">
        </a-plane>

        <a-entity camera></a-entity>

    </a-scene>
</body>
</html>
