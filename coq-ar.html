<!DOCTYPE html>
<html lang="fr">
<head>
    <title>MUE.SÉUM - Selfie Coq de Paulus</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #97f097; font-family: sans-serif; }
        
        #instructions {
            position: fixed; top: 0; width: 100%; text-align: center;
            color: black; z-index: 1000; background: white;
            padding: 15px 0; font-weight: bold; border-bottom: 2px solid black;
        }

        /* Le visualiseur 3D qui prend tout l'écran */
        model-viewer {
            width: 100vw; height: 100vh;
            --poster-color: transparent;
        }

        .ui-overlay {
            position: fixed; bottom: 30px; left: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 1000;
        }

        .btn-retour {
            background: white; color: black; border: 2px solid black;
            padding: 12px 25px; border-radius: 50px; font-weight: bold;
            text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Style du bouton de Réalité Augmentée pour le selfie */
        #ar-button {
            background-color: #000; color: white; border-radius: 10px;
            padding: 15px 25px; border: none; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="instructions">📸 Préparez votre plus beau sourire avec le Coq !</div>

    <model-viewer 
        src="https://1drv.ms/u/c/615ab6ade2b52829/IQDGUZeHt9iSToeeONUV8rHLAYkkpkK0Iby0yOcen_aEFoI?download=1" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        auto-rotate 
        shadow-intensity="1"
        exposure="1.2"
        alt="Le Coq de Pierre Paulus en 3D">
        
        <button slot="ar-button" id="ar-button">
            🤳 LANCER LE SELFIE 3D
        </button>

    </model-viewer>

    <div class="ui-overlay">
        <a href="index.html" class="btn-retour">⬅ Revenir à la Carte</a>
    </div>

</body>
</html>
