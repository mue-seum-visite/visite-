<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Etape 3 - Allée de la Sambre</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <div id="ui" style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; color: white; text-align: center; font-family: sans-serif; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; width: 80%;">
      Regardez autour de vous... <br> <b>Touchez l'écran pour ouvrir la porte du temps</b>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-assets>
        <video id="vision" src="vision1920.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
      </a-assets>

      <a-video 
        id="video-screen"
        src="#vision" 
        position="0 1.6 -3" 
        width="4" height="2.25"
        visible="false">
      </a-video>
      
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Gestion du démarrage
      document.body.addEventListener('click', function () {
        var v = document.querySelector('#vision');
        var screen = document.querySelector('#video-screen');
        var ui = document.getElementById('ui');
        
        v.play(); // Lance la vidéo
        screen.setAttribute('visible', 'true'); // Rend la vidéo visible
        ui.innerHTML = "Étape 3 : Le quai en 1920<br><small>Bougez pour comparer avec aujourd'hui</small>";
        
        // Disparition du message après 5 secondes
        setTimeout(() => { ui.style.display = 'none'; }, 5000);
      });
    </script>
  </body>
</html>
