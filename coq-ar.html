<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Test Bureau - Immersion 1920</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    
    <div id="instruction" style="position: fixed; top: 10px; left: 10px; z-index: 10; color: white; background: rgba(0,0,0,0.6); padding: 12px; font-family: sans-serif; border-radius: 8px;">
      Cliquez n'importe où pour voir la fusion 1920
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
      <a-entity camera></a-entity>
    </a-scene>

    <video id="overlay-v1920" 
           src="vision1920.mp4.mov" 
           loop="true" 
           muted="true" 
           playsinline 
           webkit-playsinline 
           crossorigin="anonymous"
           style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; opacity: 0.6; z-index: 5; pointer-events: none;">
    </video>

    <script>
      const overlayVideo = document.querySelector('#overlay-v1920');
      const instruction = document.getElementById('instruction');

      // Un seul clic n'importe où et l'histoire commence
      window.addEventListener('click', function () {
        overlayVideo.play();
        instruction.innerHTML = "Fusion active - Test Bureau";
        // On rend la vidéo bien visible pour ton test
        overlayVideo.style.opacity = '0.6';
      });
    </script>
  </body>
</html>
