<!DOCTYPE html>
<html lang="fr">
<head>
    <title>MUE.SÉUM - Selfie Coq de Paulus</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #97f097; font-family: sans-serif; overflow: hidden; }
        
        #instructions {
            position: fixed; 
            top: 20px; /* On le laisse bien en haut */
            width: 90%; 
            left: 5%;
            text-align: center;
            color: black; 
            z-index: 2000; /* Priorité haute pour être vu */
            background: white;
            padding: 10px 0; 
            font-weight: bold; 
            border: 2px solid black;
            border-radius: 10px;
        }

        model-viewer {
            width: 100vw; height: 100vh;
        }

        /* LE BOUTON NOIR - On le descend pour qu'il soit cliquable */
        #ar-button {
            background-color: #000; 
            color: white; 
            border-radius: 50px;
            padding: 20px 40px; 
            border: 2px solid white; 
            font-weight: bold;
            font-size: 18px;
            position: absolute;
            bottom: 100px; /* On le remonte un peu du bord du bas */
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            z-index: 3000; /* On le met AU-DESSUS de tout */
        }

        .ui-overlay {
            position: fixed; bottom: 20px; left: 0; width: 100%;
            display: flex; justify-content: center; z-index: 1000;
        }

        .btn-retour {
            background: white; color: black; border: 2px solid black;
            padding: 10px 20px; border-radius: 50px; font-weight: bold;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div id="instructions">📸 Préparez votre plus beau sourire !</div>

    <model-viewer 
        src="https://1drv.ms/u/c/615ab6ade2b52829/IQDGUZeHt9iSToeeONUV8rHLAYkkpkK0Iby0yOcen_aEFoI?download=1" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        auto-rotate 
        shadow-intensity="1">
        
        <button slot="ar-button" id="ar-button">
            🤳 LANCER LE SELFIE 3D
        </button>

    </model-viewer>

    <div class="ui-overlay">
        <a href="index.html" class="btn-retour">⬅ Retour</a>
    </div>

</body>
</html>
