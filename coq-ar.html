<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Le Coq de Liège - 3D Relief</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;" 
      vr-mode-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="coq3d" src="Incredible Crift-Amberis.glb"></a-asset-item>
        <img id="autocollant" src="IMG_4536.jpg">
      </a-assets>

      <a-entity 
        gltf-model="#coq3d" 
        material="src: #autocollant; roughness: 0.5;"
        position="0 1.2 -2" 
        scale="1.5 1.5 1.5"
        rotation="0 0 0">
      </a-entity>
      
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
