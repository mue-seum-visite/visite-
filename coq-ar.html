<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Paulus Étape 3 - La Sambre 1920</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden; background-color: black;">
    
    <div id="instruction" style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; color: white; background: rgba(0,0,0,0.8); padding: 15px 30px; font-family: sans-serif; border-radius: 50px; text-align: center; width: 70%; border: 2px solid white; cursor: pointer;">
      <strong>RÉVÉLER LA SAMBRE 1920</strong>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
      <a-entity camera></a-entity>
    </a-scene>

    <video id="vid-etape3" 
           src="vision1920.mp4.mov" 
           loop="true" 
           muted="true" 
           playsinline 
           webkit-playsinline 
           crossorigin="anonymous"
           style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; opacity: 0; z-index: 5; pointer-events: none; transition: opacity 2s ease-in;">
    </video>

    <script>
      const v3 = document.querySelector('#vid-etape3');
      const inst3 = document.getElementById('instruction');

      // On lance au clic sur l'écran
      document.body.addEventListener('click', function () {
        v3.play().catch(function(error) {
            console.log("Erreur lecture vidéo:", error);
        });
        v3.style.opacity = '0.65';
        inst3.style.opacity = '0';
        // On cache le bouton après l'animation pour ne pas gêner
        setTimeout(() => { inst3.style.display = 'none'; }, 2000);
      });
    </script>
  </body>
</html>
