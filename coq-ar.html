<!DOCTYPE html>
<html>
<head>
    <title>MUE.SÉUM - Selfie Pierre Paulus</title>
    <meta charset="utf-8" />
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        .ui-overlay {
            position: fixed; bottom: 30px; left: 0; width: 100%;
            display: flex; justify-content: center; z-index: 1000;
        }
        .btn-retour {
            background: #97f097; color: black; border: none;
            padding: 15px 30px; border-radius: 50px; font-weight: bold;
            text-decoration: none; font-family: sans-serif; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        #instructions {
            position: fixed; top: 20px; width: 100%; text-align: center;
            color: white; font-family: sans-serif; z-index: 1000;
            background: rgba(0,0,0,0.4); padding: 10px 0;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="instructions">Cadrez votre visage et faites une capture d'écran !</div>

    <div class="ui-overlay">
        <a href="index.html" class="btn-retour">⬅ Revenir à la Carte</a>
    </div>

    <a-scene embedded arjs='sourceType: webcam; debugUIEnabled: false;'>
        <a-assets>
            <img id="coq" src="IMG_4536.jpg">
        </a-assets>

        <a-plane src="#coq" 
                 position="0 1.5 -1.2" 
                 width="1.8" height="2.2" 
                 material="transparent: true; opacity: 0.5; shader: flat;">
        </a-plane>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
