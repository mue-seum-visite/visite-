<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Immersion Paulus - Châtelet</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden; background-color: black;">
    
    <div id="instruction" style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; color: white; background: rgba(0,0,0,0.8); padding: 15px 30px; font-family: sans-serif; border-radius: 50px; text-align: center; width: 70%; border: 2px solid white; cursor: pointer;">
      <strong id="btn-text">RÉVÉLER LE PASSÉ</strong>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
      <a-entity camera></a-entity>
    </a-scene>

    <video id="overlay-video" 
           src="" 
           loop="true" 
           muted="true" 
           playsinline 
           webkit-playsinline 
           crossorigin="anonymous"
           style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; opacity: 0; z-index: 5; pointer-events: none; transition: opacity 2s ease-in;">
    </video>

    <script>
      const video = document.querySelector('#overlay-video');
      const instruction = document.getElementById('instruction');
      const btnText = document.getElementById('btn-text');

      // ANALYSE DE L'ÉTAPE (Vient du clic sur la carte)
      const urlParams = new URLSearchParams(window.location.search);
      const etape = urlParams.get('etape');

      // CONFIGURATION SELON L'ÉTAPE
      if (etape === '2') {
          // Correction selon ta photo GitHub : .mp4 (et pas .mp4.mov)
          video.src = "gravelles1920.mp4"; 
          btnText.innerText = "VOIR LES GRAVELLES 1920";
      } else {
          // L'étape 3 garde son nom original
          video.src = "vision1920.mp4.mov"; 
          btnText.innerText = "VOIR LA SAMBRE 1920";
      }

      // LANCEMENT AU CLIC
      document.body.addEventListener('click', function () {
        if (video.src) {
            video.play();
            video.style.opacity = '0.65';
            instruction.style.opacity = '0';
            setTimeout(() => { instruction.style.display = 'none'; }, 2000);
        }
      });
    </script>
  </body>
</html>
