<!DOCTYPE html>
<html>
<head>
    <title>MUE.SÉUM - Selfie 3D Inclusif</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        .ui-overlay {
            position: fixed; bottom: 30px; left: 0; width: 100%;
            display: flex; justify-content: center; z-index: 1000;
        }
        .btn-retour {
            background: #97f097; color: black; border: 2px solid black;
            padding: 15px 30px; border-radius: 50px; font-weight: bold;
            text-decoration: none; font-family: sans-serif; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #instructions {
            position: fixed; top: 10px; width: 100%; text-align: center;
            color: white; font-family: sans-serif; z-index: 1000;
            background: rgba(0,0,0,0.6); padding: 10px 0; font-size: 16px;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="instructions">Le Coq de Pierre Paulus en 3D ! 📸</div>

    <div class="ui-overlay">
        <a href="index.html" class="btn-retour">⬅ Revenir à la Carte</a>
    </div>

    <a-scene embedded arjs='sourceType: webcam; debugUIEnabled: false;' vr-mode-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="coq-3d" src="https://1drv.ms/u/c/615ab6ade2b52829/IQDGUZeHt9iSToeeONUV8rHLAYkkpkK0Iby0yOcen_aEFoI?download=1"></a-asset-item>
        </a-assets>

        <a-entity camera>
            <a-entity gltf-model="#coq-3d" 
                      position="0 0 -0.5" 
                      scale="0.5 0.5 0.5"
                      rotation="0 180 0">
            </a-entity>
        </a-entity>

    </a-scene>
</body>
</html>
