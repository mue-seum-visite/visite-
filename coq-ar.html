<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-assets>
        <video id="v1920" src="vision1920.mp4.mov" preload="auto" loop="true" muted="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-video 
        src="#v1920" 
        position="0 2.5 -4" 
        width="5" height="2.8"
        opacity="0.6">
      </a-video>
      
      <a-entity camera></a-entity>
    </a-scene>
    <script>
      window.addEventListener('click', function () { document.querySelector('#v1920').play(); });
    </script>
  </body>
</html>
