<!DOCTYPE html>
<html lang="fr">
<head>
    <title>MUE.SÉUM - Selfie 3D</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #97f097; font-family: sans-serif; overflow: hidden; }
        
        model-viewer {
            width: 100vw; height: 100vh;
        }

        /* LE BOUTON NOIR DE SELFIE - Placé au milieu pour ne pas gêner le retour */
        #ar-button {
            background-color: #000; 
            color: white; 
            border-radius: 50px;
            padding: 25px 50px; 
            border: 3px solid white; 
            font-weight: bold;
            font-size: 20px;
            position: absolute;
            top: 50%; /* On le met pile au milieu de l'écran */
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .ui-overlay {
            position: fixed; 
            bottom: 40px; /* Le bouton retour reste bien en bas */
            left: 0; 
            width: 100%;
            display: flex; 
            justify-content: center; 
            z-index: 1000;
        }

        .btn-retour {
            background: white; 
            color: black; 
            border: 2px solid black;
            padding: 15px 30px; 
            border-radius: 50px; 
            font-weight: bold;
            text-decoration: none;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="https://1drv.ms/u/c/615ab6ade2b52829/IQDGUZeHt9iSToeeONUV8rHLAYkkpkK0Iby0yOcen_aEFoI?download=1" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        auto-rotate 
        shadow-intensity="1">
        
        <button slot="ar-button" id="ar-button">
            🤳 LANCER LE SELFIE 3D
        </button>

    </model-viewer>

    <div class="ui-overlay">
        <a href="index.html" class="btn-retour">⬅ Revenir à la Carte</a>
    </div>

</body>
</html>
