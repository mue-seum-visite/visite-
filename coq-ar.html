<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Coq de Liège - AR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
      vr-mode-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="coq-relief" src="Incredible%20Crift-Amberis.glb"></a-asset-item>
        <img id="image-originale" src="IMG_4536.jpg">
      </a-assets>

      <a-entity 
        gltf-model="#coq-relief" 
        material="src: #image-originale"
        position="0 -1 -3" 
        scale="2 2 2"
        rotation="0 0 0">
      </a-entity>
      
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
