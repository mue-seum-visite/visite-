<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Coq AR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://ajax.googleapis.com/ajax/libs/model-viewer/v3.5.0/model-viewer.min.js" type="module"></script>
<style>
body { margin:0; padding:0; overflow:hidden; background:#000; }
model-viewer { width:100vw; height:100vh; }
</style>
</head>
<body>

<model-viewer
id="coq"
src="Incredible%20Crift-Amberis.glb"
ar
ar-modes="quick-look webxr"
camera-controls
auto-rotate
shadow-intensity="1"
exposure="1.0"
environment-intensity="0.8">
</model-viewer>

</body>
</html>
