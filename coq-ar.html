<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Coq de Liège - 3D avec couleurs originales</title>
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<style>
body { margin: 0; overflow: hidden; background: #111; }
</style>
</head>
<body>

<a-scene background="color: #222222">

<!-- Assets -->
<a-assets>
<!-- Ton modèle 3D -->
<a-asset-item id="le-coq" src="Incredible%20Crift-Amberis.glb"></a-asset-item>

<!-- Ton image originale du coq rouge (CHANGE SEULEMENT SI LE NOM EST DIFFÉRENT) -->
<img id="texture-coq" src="IMG_4536.jpg" crossorigin="anonymous">
</a-assets>

<!-- Le coq 3D -->
<a-entity
gltf-model="#le-coq"
position="0 0.8 -4"
scale="2.8 2.8 2.8"
rotation="0 35 0"
custom-texture>
</a-entity>

<!-- Caméra avec contrôles -->
<a-entity
camera
position="0 2 6"
look-controls
wasd-controls>
</a-entity>

</a-scene>

<!-- Script pour appliquer la texture rouge -->
<script>
AFRAME.registerComponent('custom-texture', {
init: function () {
this.el.addEventListener('model-loaded', () => {
const mesh = this.el.getObject3D('mesh');
if (!mesh) {
console.error("Mesh non trouvé");
return;
}

const img = document.getElementById('texture-coq');
if (!img) {
console.error("Image texture introuvable ! Vérifie que IMG_4536.jpg existe bien.");
return;
}

const texture = new THREE.TextureLoader().load(img.src, function(tex) {
tex.flipY = false;
tex.needsUpdate = true;
});

mesh.traverse((node) => {
if (node.isMesh && node.material) {
node.material = new THREE.MeshStandardMaterial({
map: texture,
roughness: 0.75,
metalness: 0.05,
side: THREE.DoubleSide
});
}
});

console.log("✅ Texture rouge du coq appliquée avec succès !");
});
}
});
</script>

</body>
</html>
