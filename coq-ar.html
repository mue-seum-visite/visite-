<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Liège 1920 - Immersion Finale</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    
    <div id="instruction" style="position: fixed; top: 10px; left: 10px; z-index: 10; color: white; background: rgba(0,0,0,0.6); padding: 12px; font-family: sans-serif; border-radius: 8px;">
      Cliquez sur l'écran pour voir 1920
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
      
      <a-assets>
        <video id="v1920" 
               src="vision1920.mp4.mov" 
               preload="auto" 
               loop="true" 
               muted="true" 
               playsinline 
               webkit-playsinline 
               crossorigin="anonymous">
        </video>
      </a-assets>

      <a-video 
        src="#v1920" 
        position="0 1.6 -3" 
        width="4.5" 
        height="2.5">
      </a-video>
      
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Indispensable pour lancer la vidéo sur mobile
      window.addEventListener('click', function () {
        var video = document.querySelector('#v1920');
        video.play();
        document.getElementById('instruction').style.display = 'none';
      });
    </script>
  </body>
</html>
