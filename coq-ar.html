<!DOCTYPE html>
<html>
<head>
    <title>MUE.SÉUM - Selfie Garanti</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        .ui-overlay {
            position: fixed; bottom: 30px; left: 0; width: 100%;
            display: flex; justify-content: center; z-index: 1000;
        }
        .btn-retour {
            background: #97f097; color: black; border: 2px solid black;
            padding: 12px 25px; border-radius: 50px; font-weight: bold;
            text-decoration: none; font-family: sans-serif;
        }
        #instructions {
            position: fixed; top: 10px; width: 100%; text-align: center;
            color: white; font-family: sans-serif; z-index: 1000;
            background: rgba(0,0,0,0.5); padding: 8px 0; font-size: 14px;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="instructions">Le coq est là ! 📸</div>

    <div class="ui-overlay">
        <a href="index.html" class="btn-retour">⬅ Revenir à la Carte</a>
    </div>

    <a-scene embedded arjs='sourceType: webcam; debugUIEnabled: false;' vr-mode-ui="enabled: false">
        
        <a-assets>
            <img id="coq-img" src="IMG_4536.jpg">
        </a-assets>

        <a-entity camera>
            <a-plane src="#coq-img" 
                     position="0 0 -0.2" 
                     width="0.15" height="0.2" 
                     material="transparent: true; opacity: 0.5; shader: flat; side: double;">
            </a-plane>
        </a-entity>

    </a-scene>
</body>
</html>
