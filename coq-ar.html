<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Coq de Paulus - Vraie RA</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-webxr.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene 
      webxr="optionalFeatures: hit-test, local-floor; referenceSpaceType: local-floor"
      ar-hit-test="target: #mon-coq;"
      renderer="colorManagement: true;">
      
      <a-assets>
        <a-asset-item id="relief-glb" src="Incredible Crift-Amberis.glb"></a-asset-item>
        <img id="texture-image" src="IMG_4536.jpg">
      </a-assets>

      <a-entity id="mon-coq" visible="false">
        <a-entity 
          gltf-model="#relief-glb"
          material="src: #texture-image; roughness: 0.4;"
          scale="1.5 1.5 1.5"
          rotation="0 0 0">
        </a-entity>
      </a-entity>

      <a-camera position="0 1.2 0"></a-camera>
    </a-scene>
  </body>
</html>
