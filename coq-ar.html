<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Coq de Liège - 3D Couleur</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <a-asset-item id="le-coq-relief" src="Incredible%20Crift-Amberis.glb"></a-asset-item>
        <img id="ma-couleur" src="IMG_4536.jpg">
      </a-assets>

      <a-entity 
        gltf-model="#le-coq-relief" 
        material="src: #ma-couleur; color: #ffffff; roughness: 1; metalness: 0"
        position="0 1 -3" 
        scale="2.5 2.5 2.5"
        rotation="0 0 0">
      </a-entity>
      
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
