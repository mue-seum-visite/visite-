<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Étape 4 - La Sambre en 1920</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: black; }
        #btn-play {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 30; background: #97f097; color: black; padding: 20px;
            border-radius: 50px; font-weight: bold; border: none;
        }
        #vid-sambre {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; opacity: 0; z-index: 5; transition: opacity 2s;
        }
    </style>
</head>
<body>
    <button id="btn-play">VOIR LA SAMBRE EN 1920</button>

    <video id="vid-sambre" src="vision1920.mp4.mov" loop="true" playsinline webkit-playsinline></video>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const video = document.getElementById('vid-sambre');
        const btn = document.getElementById('btn-play');
        btn.addEventListener('click', function() {
            btn.style.display = 'none';
            video.play();
            video.style.opacity = "1";
        });
    </script>
</body>
</html>
