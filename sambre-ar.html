<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>MUE.SÉUM - Étape 4 : La Sambre 1920</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <meta property="og:title" content="MUE.SÉUM - L'âme du Pays Noir" />
    <meta property="og:description" content="Une faille temporelle s'est ouverte à Châtelet... J'ai croisé l'ombre de Pierre Paulus et revécu la ferveur du Pays Noir. Rejoignez l'aventure !" />
    <meta property="og:image" content="https://mue-seum-visite.github.io/visite-/unnamed.jpg" />
    <meta property="og:url" content="https://mue-seum-visite.github.io/visite-/sambre-ar.html" />
    <meta property="og:type" content="website" />

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: black; font-family: -apple-system, sans-serif; }
        
        .top-nav {
            position: fixed; top: 20px; width: 100%; display: flex; 
            justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 100;
        }

        .btn-ui {
            background: rgba(0,0,0,0.6); color: white; padding: 10px 15px;
            border-radius: 20px; text-decoration: none; border: 1px solid white;
            font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        /* Le bouton de partage mis en avant */
        .btn-partage { background: #97f097; color: black; border: none; }

        #btn-play {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 30; background: #97f097; color: black; padding: 20px 30px;
            border-radius: 50px; font-weight: bold; border: none; font-size: 1.2em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #vid-sambre {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; opacity: 0; z-index: 5; transition: opacity 2s;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="index.html?map=true" class="btn-ui">← CARTE</a>
        <button onclick="partager()" class="btn-ui btn-partage">📤 PARTAGE MON AVENTURE</button>
    </div>

    <button id="btn-play">DÉCOUVRIR LA SAMBRE </button>

    <video id="vid-sambre" 
           src="vision1920.mp4.mov" 
           loop="true" 
           muted
           playsinline 
           webkit-playsinline>
    </video>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const video = document.getElementById('vid-sambre');
        const btn = document.getElementById('btn-play');

        btn.addEventListener('click', function() {
            btn.style.display = 'none';
            video.play();
            video.style.opacity = "0.6"; 
        });

        function partager() {
            if (navigator.share) {
                navigator.share({
                    title: 'MUE.SÉUM - Pierre Paulus',
                    text: "Une faille temporelle s'est ouverte au détour d'une rue à Châtelet... J'ai croisé l'ombre de Pierre Paulus et revécu la ferveur du Pays Noir. L'aventure vous attend ici.",
                    url: window.location.href
                });
            } else {
                alert("Utilisez Safari ou Chrome pour partager votre aventure !");
            }
        }
    </script>
</body>
</html>
