<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>MUE.SÉUM - Étape 4 : La Sambre 1920</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: black; }
        #btn-play {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 30; background: #97f097; color: black; padding: 20px 30px;
            border-radius: 50px; font-weight: bold; border: none; font-size: 1.2em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #vid-sambre {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; opacity: 0; z-index: 5; transition: opacity 2s;
        }
        .btn-retour {
            position: fixed; top: 20px; left: 20px; z-index: 100;
            background: rgba(0,0,0,0.5); color: white; padding: 10px;
            border-radius: 20px; text-decoration: none; border: 1px solid white;
        }
    </style>
</head>
<body>

    <a href="index.html" class="btn-retour">← Retour</a>

    <button id="btn-play">DÉCOUVRIR LA SAMBRE EN 1920</button>

    <video id="vid-sambre" 
           src="vision1920.mp4.mov" 
           loop="true" 
           muted
           playsinline 
           webkit-playsinline>
    </video>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const video = document.getElementById('vid-sambre');
        const btn = document.getElementById('btn-play');

        btn.addEventListener('click', function() {
            btn.style.display = 'none';
            video.play();
            // RÉGLAGE DE LA TRANSPARENCE ICI
            // 0.6 = on voit bien à travers (effet fantôme)
            // 1.0 = la vidéo cache tout
            video.style.opacity = "0.6"; 
        });
    </script>
</body>
</html>
