<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Pont-de-Loup - Étape 3 : Le Secret de la Source</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <link rel="stylesheet" href="style2.css">
    
    <style>
        body { margin: 0; overflow: hidden; background-color: black; font-family: sans-serif; }
        
        .btn-retour {
            position: fixed; top: 25px; left: 20px; z-index: 100;
            background: rgba(0,0,0,0.6); color: white; padding: 12px 18px;
            border-radius: 10px; text-decoration: none; font-size: 14px;
            font-weight: bold; border: 1px solid #8cb6d1;
            backdrop-filter: blur(4px);
        }

        .btn-partage {
            position: fixed; bottom: 30px; right: 0; z-index: 100;
            background: #8cb6d1; color: #000; padding: 12px 25px;
            border-radius: 30px 0 0 30px;
            text-decoration: none; 
            font-size: 13px; font-weight: bold; border: none;
            box-shadow: -2px 0 15px rgba(0,0,0,0.5);
        }

        #btn-start {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 30; background: #8cb6d1; color: black; padding: 20px 30px;
            border-radius: 50px; font-weight: bold; border: none; text-transform: uppercase;
        }

        #vid-final {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; 
            opacity: 0; /* Géré par le JS au clic */
            z-index: 5; 
            transition: opacity 2s;
            mix-blend-mode: multiply;
        }
    </style>
</head>

<body>

    <a href="index2.html?map=true" class="btn-retour" onclick="stopMedias()">← RETOUR CARTE</a>
    
    <button class="btn-partage" id="ui-share" onclick="partagerParcours()">✦ PARTAGER MON VOYAGE</button>
    
    <button id="btn-start">DÉCOUVRIR LE SECRET</button>

    <video id="vid-final" src="video_pdl_3.mp4" loop="true" muted playsinline webkit-playsinline></video>
    <audio id="audio-final" src="audio_pdl_3.mp3"></audio>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const video = document.getElementById('vid-final');
        const audio = document.getElementById('audio-final');
        const btn = document.getElementById('btn-start');

        btn.addEventListener('click', function() {
            btn.style.display = 'none';
            
            // --- RÉGLAGES VITESSE ET OPACITÉ ---
            video.playbackRate = 0.6; // Ralentit la vidéo à 60% de sa vitesse
            video.style.opacity = "0.6"; // Opacité plus légère pour voir à travers
            
            video.play();
            if(audio) {
                audio.volume = 0.5; // Baisse un peu le son pour la douceur
                audio.play();
            }
        });

        function stopMedias() {
            video.pause();
            if(audio) audio.pause();
        }

        function partagerParcours() {
            const textePoetique = "J'ai ouvert la porte du temps à Pont-de-Loup... Entre les pierres de l'ancienne tour et le murmure de la source, l'histoire s'est éveillée. Un voyage poétique signé MUE.SÉUM. ✨🏛️";
            const urlSite = window.location.href.split('etape_pdl_3')[0] + 'index2.html';

            if (navigator.share) {
                navigator.share({
                    title: 'Mon Voyage à Pont-de-Loup',
                    text: textePoetique,
                    url: urlSite,
                }).catch((error) => console.log('Erreur de partage', error));
            } else {
                alert("Le texte poétique a été copié !");
                navigator.clipboard.writeText(textePoetique + " " + urlSite);
            }
        }
    </script>
</body>
</html>
