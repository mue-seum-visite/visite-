<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Pont-de-Loup - Étape 1</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <video id="vid" src="video_pdl_1.mp4" preload="auto" loop="true" playsinline webkit-playsinline></video>
            <audio id="snd" src="soldat_parle.mp3" preload="auto"></audio>
        </a-assets>

        <a-marker type="pattern" url="pdl_marker_1.patt" id="marker">
            
            <a-video src="#vid" 
                     width="2" height="1.5" 
                     rotation="-90 0 0" 
                     position="0 0 0"
                     material="transparent: true; opacity: 0.9">
            </a-video>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const marker = document.querySelector('#marker');
        const video = document.querySelector('#vid');
        const audio = document.querySelector('#snd');

        // Quand le téléphone voit l'image
        marker.addEventListener('markerFound', function() {
            video.play();
            audio.play();
        });

        // Quand le téléphone ne voit plus l'image (on coupe tout)
        marker.addEventListener('markerLost', function() {
            video.pause();
            audio.pause();
            // Optionnel : décommenter pour recommencer du début à chaque fois
            // video.currentTime = 0;
            // audio.currentTime = 0;
        });
    </script>
</body>
</html>
