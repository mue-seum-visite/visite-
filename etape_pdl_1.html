<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pont-de-Loup - Étape 1</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        /* Bouton pour forcer le son sur mobile */
        #playButton {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; background: #8cb6d1; color: white;
            border: none; border-radius: 50px; font-weight: bold; z-index: 999;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">
    <button id="playButton">Cliquer pour activer le son</button>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
        
        <a-assets>
            <video id="vid" src="video_pdl_1.mp4" preload="auto" loop="true" playsinline webkit-playsinline muted></video>
            <audio id="snd" src="soldat_parle.mp3" preload="auto"></audio>
        </a-assets>

        <a-marker type="pattern" url="pdl_marker_1.patt" id="marker">
            <a-video src="#vid" width="2" height="1.5" rotation="-90 0 0" position="0 0 0"></a-video>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const marker = document.querySelector('#marker');
        const video = document.querySelector('#vid');
        const audio = document.querySelector('#snd');
        const btn = document.querySelector('#playButton');

        // Au clic sur le bouton, on "réveille" la vidéo et l'audio
        btn.addEventListener('click', function() {
            video.play(); video.pause(); // On pré-charge
            audio.play(); audio.pause();
            btn.style.display = 'none'; // On cache le bouton
        });

        marker.addEventListener('markerFound', function() {
            video.muted = false; // On enlève le silencieux
            video.play();
            audio.play();
        });

        marker.addEventListener('markerLost', function() {
            video.pause();
            audio.pause();
        });
    </script>
</body>
</html>
