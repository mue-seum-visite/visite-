<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Pont-de-Loup - Étape 1 : Le Murmure des Soldats</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: black; font-family: sans-serif; }
        
        #subtitles-container {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 15px;
            padding: 20px;
            z-index: 20;
            display: none;
            border: 1px solid #8cb6d1;
            transition: opacity 1s;
        }

        #text-display {
            color: white;
            font-family: 'Georgia', serif;
            font-size: 1.1em;
            line-height: 1.4;
            text-align: center;
            font-style: italic;
        }

        #btn-start {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 30;
            background: #8cb6d1;
            color: black;
            padding: 20px 30px;
            border-radius: 50px;
            font-weight: bold;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-transform: uppercase;
        }

        #vid-soldat {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            opacity: 0;
            z-index: 5;
            transition: opacity 2s;
        }

        .btn-retour {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 10px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 12px;
            border: 1px solid white;
        }
    </style>
</head>

<body>

    <a href="index2.html?map=true" class="btn-retour">← RETOUR CARTE</a>
    
    <button id="btn-start">ÉCOUTER LE SOLDAT</button>

    <video id="vid-soldat" 
            src="video_pdl_1.mp4" 
            loop="true" 
            muted
            playsinline 
            webkit-playsinline>
    </video>
    
    <audio id="audio-soldat" src="soldat_parle.mp3"></audio>

    <div id="subtitles-container">
        <div id="text-display"></div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const video = document.getElementById('vid-soldat');
        const audio = document.getElementById('audio-soldat');
        const btn = document.getElementById('btn-start');
        const subContainer = document.getElementById('subtitles-container');
        const textDisplay = document.getElementById('text-display');

        const message = [
            "Bonjour à toi, voyageur. Sois le bienvenu ici, au pied de notre vieille Tour.",
            "Si tu m'écoutes aujourd'hui, souviens-toi : la paix est un trésor...",
            "qu'on ne réalise qu'une fois perdu.",
            "Ne laisse pas la haine construire le monde de demain."
        ];

        let lineIndex = 0;
        let textInterval;

        function showNextLine() {
            if (lineIndex < message.length) {
                textDisplay.style.opacity = 0;
                setTimeout(() => {
                    textDisplay.innerHTML = message[lineIndex];
                    textDisplay.style.opacity = 1;
                    lineIndex++;
                }, 500);
            } else {
                clearInterval(textInterval);
                setTimeout(() => {
                    video.style.opacity = "0"; 
                    subContainer.style.opacity = "0";
                    setTimeout(() => {
                        video.pause();
                        if(audio) audio.pause();
                        subContainer.style.display = 'none';
                    }, 2000);
                }, 3000); // Disparition un peu plus rapide à la fin
            }
        }

        btn.addEventListener('click', function() {
            btn.style.display = 'none';
            
            // On garde ta vitesse de vidéo à 70%
            video.playbackRate = 0.7;

            video.play();
            if(audio) audio.play();
            
            video.style.opacity = "0.7"; 
            subContainer.style.display = 'block';
            
            showNextLine();
            // VITESSE CHANGÉE ICI : 4000ms au lieu de 6000ms
            textInterval = setInterval(showNextLine, 4000);
        });
    </script>
</body>
</html>
